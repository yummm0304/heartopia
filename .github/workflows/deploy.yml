name: GitHub Pages 배포

on:
  push:
    branches: ["master"]   # master 브랜치에 push 시 자동 실행
  workflow_dispatch:        # Actions 탭에서 수동 실행도 가능

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false  # 진행 중인 배포는 취소하지 않음

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Pages 설정
        uses: actions/configure-pages@v5
        with:
          enablement: true   # GitHub Pages가 미설정 상태여도 자동으로 GitHub Actions 소스로 활성화

      - name: 빌드 결과물 업로드
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'   # 루트 전체를 그대로 서빙

      - name: GitHub Pages 배포
        id: deployment
        uses: actions/deploy-pages@v4
