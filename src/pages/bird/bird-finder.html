<!DOCTYPE html>
<html lang="ko">
<head>
    <script>
        // Google Analytics 4 초기화
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-RXTDCP8G1V');
    </script>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>새 찾기 - 두근두근타운</title>
    <link href="../../css/common.css" rel="stylesheet">

    <!-- 방문자 추적 스크립트 (로컬 localStorage 기록용) -->
    <script src="../../../src/js/tracker.js"></script>
</head>
<body>
<div id="header-placeholder"></div>

<main>
    <div class="datetime-section">
        <nav>
            <ul>
                <li><a href="bird-list.html">조류 도감</a></li>
            </ul>
        </nav>
        <h1>🔍 새 찾기</h1>
        <p>현재 조건에서 잡을 수 있는 새를 찾아보세요</p>

        <div class="datetime-display">
            <div class="date-info">
                <div class="current-date" id="currentDate"></div>
                <div class="current-time" id="currentTime"></div>
            </div>
        </div>
        <div class="time-bar">
            <div class="time-segment morning">
                <div class="segment-label">🌅 아침</div>
                <div class="segment-time">06:00 - 12:00</div>
            </div>
            <div class="time-segment afternoon">
                <div class="segment-label">☀️ 낮</div>
                <div class="segment-time">12:00 - 18:00</div>
            </div>
            <div class="time-segment evening">
                <div class="segment-label">🌆 저녁</div>
                <div class="segment-time">18:00 - 00:00</div>
            </div>
            <div class="time-segment night">
                <div class="segment-label">🌙 새벽</div>
                <div class="segment-time">00:00 - 06:00</div>
            </div></div>
    </div>
    </div>

    <div class="input-section">
        <div class="input-group">
            <div class="input-item">
                <label for="birdName">🐦 새 이름</label>
                <input id="birdName" oninput="filterbird()" placeholder="예: 비둘기, 앵무, 홍학..." type="text">
            </div>

            <div class="input-item">
                <label for="level">📸 취미 레벨</label>
                <!-- JSON 데이터 기준 최고 레벨은 10 -->
                <input id="level" max="10" min="1" type="number" value="10">
            </div>

            <div class="input-item">
                <label for="time">🕐 시간대</label>
                <select id="time">
                    <option value="아침">아침</option>
                    <option value="낮">낮</option>
                    <option value="저녁">저녁</option>
                    <option value="새벽">새벽</option>
                </select>
            </div>

            <div class="input-item">
                <label for="weather">🌤️ 날씨</label>
                <select id="weather">
                    <option selected value="맑음">맑음</option>
                    <option value="비">비</option>
                    <option value="무지개">무지개</option>
                </select>
            </div>
        </div>

        <!-- 시즌 추가/제거 버튼 — 새 시즌 추가 시 버튼과 loadSeasonData 경로만 추가 -->
        <div style="display: flex; gap: 8px; margin-top: 16px; flex-wrap: wrap; align-items: center;">
            <button onclick="filterbird()">🔍 새 찾기</button>
            <button class="filter-btn season-ice-btn"        id="btnIceAdd"        onclick="loadSeasonData('season_ice/season_ice_bird.json', 'ice')">❄️ 빙설 추가</button>
            <!-- 꿈의 명암 새 데이터가 생기면 아래 주석을 해제 -->
             <button class="filter-btn season-dreamlight-btn" id="btnDreamlightAdd" onclick="loadSeasonData('season_dreamlight/season_dreamlight_bird.json', 'dreamlight')">🌙 꿈의 명암 추가</button>
            <button class="filter-btn season-blocktown-btn" id="btnBlocktownAdd"    onclick="loadSeasonData('season_blocktown/season_blocktown_bird.json', 'blocktown')">🧱 블록 시가지 추가</button>
            <button class="filter-btn-reset"                 id="btnSeasonRemove"  onclick="removeSeasonData()">🗑️ 시즌 제거</button>
        </div>
    </div>

    <div class="results" id="results"></div>
</main>

<div id="footer-placeholder"></div>

<script src="../../js/common.js"></script>
<script>
    /** @type {Array<Object>} 로드된 새 데이터 배열 */
    let birdData = [];

    /** @type {Object} 현재 정렬 기준 {column, order} */
    let currentSort = {column: 'price', order: 'desc'};

    /** @type {Set<string>} 로드된 시즌 파일명 집합 (중복 방지) */
    let loadedSeasons = new Set();

    /**
     * 등급(성)별 판매가 배율 테이블
     * JSON의 price 값은 3성 기준 → 3성 배율을 1로 설정
     * 1성: 12.5%  2성: 50%  3성: 100%(기준)  4성: 200%  5성: 400%
     */
    const starMultipliers = {
        1: 0.125,
        2: 0.5,
        3: 1,
        4: 2,
        5: 4
    };

    /** 시간대 이모지 맵 */
    // const timeIcons    = { '아침': '🌅', '낮': '☀️', '저녁': '🌆', '새벽': '🌙' };
    /** 날씨 이모지 맵 */
    const weatherIcons = { '맑음': '☀️', '비': '🌧️', '무지개': '🌈' };

    function updateDateTime() {
        const now = new Date();
        const days = ['일요일', '월요일', '화요일', '수요일', '목요일', '금요일', '토요일'];
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const date = String(now.getDate()).padStart(2, '0');
        const dayName = days[now.getDay()];
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        const seconds = String(now.getSeconds()).padStart(2, '0');

        document.getElementById('currentDate').textContent =
            `${year}년 ${month}월 ${date}일 ${dayName}`;
        document.getElementById('currentTime').textContent =
            `${hours}:${minutes}:${seconds}`;

        // 현재 시간대 계산 및 활성화
        const hour = now.getHours();
        let currentPeriod = '';
        let position = 0;

        if (hour >= 6 && hour < 12) {
            currentPeriod = 'morning';
            position = ((hour - 6) * 60 + now.getMinutes()) / 360;
            position = position * 25 + 12.5;
        } else if (hour >= 12 && hour < 18) {
            currentPeriod = 'afternoon';
            position = ((hour - 12) * 60 + now.getMinutes()) / 360;
            position = position * 25 + 37.5;
        } else if (hour >= 18 && hour < 24) {
            currentPeriod = 'evening';
            position = ((hour - 18) * 60 + now.getMinutes()) / 360;
            position = position * 25 + 62.5;
        } else {
            currentPeriod = 'night';
            position = (hour * 60 + now.getMinutes()) / 360;
            position = position * 25 + 87.5;
        }

        document.querySelectorAll('.time-segment').forEach(seg => {
            seg.classList.remove('active');
        });

        const activeSegment = document.querySelector(`.time-segment.${currentPeriod}`);
        if (activeSegment) {
            activeSegment.classList.add('active');
        }
    }

    // 1초마다 업데이트
    setInterval(updateDateTime, 1000);
    updateDateTime();

    // 페이지 로드시 현재 시간에 맞춰 select 박스 설정
    function setInitialTimeOption() {
        const hour = new Date().getHours();
        const timeSelect = document.getElementById('time');

        if (hour >= 6 && hour < 12) {
            timeSelect.value = '아침';
        } else if (hour >= 12 && hour < 18) {
            timeSelect.value = '낮';
        } else if (hour >= 18 && hour < 24) {
            timeSelect.value = '저녁';
        } else {
            timeSelect.value = '새벽';
        }
    }

    async function loadbirdData() {
        try {
            let response = await fetch('../../data/bird_data.json');

            if (!response.ok) {
                response = await fetch('./bird_data.json');
            }

            if (!response.ok) {
                throw new Error('bird_data.json 파일을 찾을 수 없습니다.');
            }

            birdData = await response.json();
            console.log('새 데이터 로드 성공:', birdData.length + '종');
            filterbird();
        } catch (error) {
            console.error('데이터 로드 에러:', error);
            document.getElementById('results').innerHTML =
                `<div class="error">❌ 데이터 파일을 불러올 수 없습니다.</div>`;
        }
    }

    /**
     * 시즌 데이터를 birdData 에 병합합니다.
     * @param {string} dataPath  - src/data/ 기준 상대 경로 (예: 'season_ice/season_ice_bird.json')
     * @param {string} seasonKey - 중복 방지 추적 키 (예: 'ice', 'dreamlight')
     */
    async function loadSeasonData(dataPath, seasonKey) {
        if (loadedSeasons.has(seasonKey)) {
            alert('이미 추가된 시즌입니다.');
            return;
        }

        try {
            const response = await fetch(`../../data/${dataPath}`);

            if (!response.ok) {
                throw new Error(`${dataPath} 파일을 찾을 수 없습니다.`);
            }

            const seasonData = await response.json();

            // 이름 기준 중복 제거하며 병합
            const combined = [...birdData, ...seasonData];
            birdData = combined.filter((bird, index, self) =>
                index === self.findIndex((f) => f.name === bird.name)
            );

            loadedSeasons.add(seasonKey);

            // 추가 버튼 비활성화
            const addBtn = document.getElementById(`btn${seasonKey.charAt(0).toUpperCase() + seasonKey.slice(1)}Add`);
            if (addBtn) addBtn.disabled = true;

            alert(`${seasonData.length}종의 시즌 데이터가 병합되었습니다.\n(총 ${birdData.length}종)`);
            filterbird();
        } catch (error) {
            console.error('시즌 데이터 로드 에러:', error);
            alert(`시즌 데이터를 불러오지 못했습니다.\n${error.message}`);
        }
    }

    async function removeSeasonData() {
        if (loadedSeasons.size === 0) {
            alert('제거할 시즌 데이터가 없습니다.');
            return;
        }

        try {
            let response = await fetch('../../data/bird_data.json');
            if (!response.ok) {
                response = await fetch('./bird_data.json');
            }

            if (!response.ok) {
                throw new Error('bird_data.json 파일을 찾을 수 없습니다.');
            }

            birdData = await response.json();
            loadedSeasons.clear();

            // 모든 추가 버튼을 다시 활성화
            ['btnIceAdd', 'btnDreamlightAdd', 'btnBlocktownAdd'].forEach(id => {
                const btn = document.getElementById(id);
                if (btn) btn.disabled = false;
            });

            alert('모든 시즌 데이터가 제거되었습니다.\n기본 데이터만 표시됩니다.');
            filterbird();
        } catch (error) {
            console.error('데이터 초기화 에러:', error);
            alert('데이터를 초기화하지 못했습니다.');
        }
    }

    function filterbird() {
        if (birdData.length === 0) {
            document.getElementById('results').innerHTML = '<div class="loading">⏳ 데이터를 불러오는 중...</div>';
            return;
        }

        const birdName = document.getElementById('birdName').value.trim().toLowerCase();
        const level = parseInt(document.getElementById('level').value);
        const time = document.getElementById('time').value;
        const weather = document.getElementById('weather').value;

        const filtered = birdData.filter(bird => {
            if (birdName && !bird.name.toLowerCase().includes(birdName)) return false;
            if (bird.level > level) return false;
            const timeOk = bird.time && bird.time.includes(time);
            // 무지개는 모든 날씨의 상위 호환이므로, 날씨가 무지개이면 bird.weather 조건과 무관하게 통과
            // (단, "무지개"라고 명시된 bird는 무지개 날씨에서만 출현 → 별도 처리 없이 includes로 자연스럽게 걸러짐)
            const weatherOk = weather === '무지개'
                ? true
                : bird.weather && bird.weather.includes(weather);
            return timeOk && weatherOk;
        });

        displayResults(filtered);
    }

    /**
     * 새 배열을 지정 열·방향으로 정렬 (원본 불변)
     * preening/wingspread는 현재 선택된 시간+날씨 기준 점수로 정렬
     *
     * @param {Array<Object>} birdes
     * @param {string} column - 'name'|'habitat'|'level'|'price'|'preening'|'wingspread'
     * @param {string} order  - 'asc'|'desc'
     * @returns {Array<Object>}
     */
    function sortbird(birdes, column, order) {
        // motion 정렬 시 현재 선택 조건을 DOM에서 읽음
        const currentTime    = document.getElementById('time')?.value    || '';
        const currentWeather = document.getElementById('weather')?.value || '';

        return [...birdes].sort((a, b) => {
            let valueA, valueB;

            if (column === 'name' || column === 'habitat') {
                valueA = column === 'name' ? a.name : a.habitat;
                valueB = column === 'name' ? b.name : b.habitat;
                return order === 'asc'
                    ? valueA.localeCompare(valueB, 'ko')
                    : valueB.localeCompare(valueA, 'ko');
            } else if (column === 'level') {
                valueA = a.level;
                valueB = b.level;
            } else if (column === 'price') {
                valueA = a.price;
                valueB = b.price;
            }

            return order === 'asc' ? valueA - valueB : valueB - valueA;
        });
    }

    function handleSort(column) {
        if (currentSort.column === column) {
            currentSort.order = currentSort.order === 'asc' ? 'desc' : 'asc';
        } else {
            currentSort.column = column;
            currentSort.order = 'asc';
        }
        filterbird();
    }

    function updatePrice(birdName, basePrice, selectElement) {
        const star = parseInt(selectElement.value);
        const multiplier = starMultipliers[star];
        const calculatedPrice = Math.floor(basePrice * multiplier);

        const priceSpan = selectElement.parentElement.querySelector('.price');
        priceSpan.textContent = `₩${calculatedPrice}`;
    }

    /**
     * special 값에 따른 아이콘 반환
     * JSON 실제 값: false | "특수" | "보너스 스테이지" | "희귀" | "빙설 시즌"
     */
    function getSpecialIcon(special) {
        const icons = {
            '특수': '🌟',
            '보너스 스테이지': '🎁',
            '희귀': '💎',
            '빙설 시즌': '❄️'
        };
        return icons[special] || '';
    }

    /**
     * 이벤트성 서식지에 아이콘 부여
     */
    function getHabitatIcon(habitat) {
        const icons = {
            '새들의 복귀 사건': '🎯',
            '겨울 기록 채집 사건': '❄️'
        };
        return icons[habitat] || '';
    }

    /**
     * motion 객체(깃털 다듬기 / 날개 펼치기)를 HTML 뱃지 문자열로 변환
     * activeTime·activeWeather가 주어지면 일치하는 뱃지에 'motion-match' 클래스 추가
     *
     * @param {Object|null} motionObj  - { 시간: [날씨, ...], ... } 형태 또는 null
     * @param {string|null} activeTime    - 현재 선택 시간대 (하이라이트용)
     * @param {string|null} activeWeather - 현재 선택 날씨 (하이라이트용)
     * @returns {string} HTML 문자열
     */
    function formatMotion(motionObj, activeTime = null, activeWeather = null) {
        if (!motionObj) return '<span class="motion-none">-</span>';

        const entries = Object.entries(motionObj);
        if (entries.length === 0) return '<span class="motion-none">-</span>';

        return entries.map(([time, weathers]) => {
            // 현재 조건(시간 AND 날씨)이 모두 일치하면 하이라이트
            // 무지개는 모든 날씨의 상위 호환 → 날씨가 무지개이면 weathers 목록과 무관하게 날씨 조건 만족
            const weatherMatch = activeWeather === '무지개'
                ? true
                : weathers.includes(activeWeather);
            const isMatch = activeTime !== null
                && activeWeather !== null
                && time === activeTime
                && weatherMatch;

            const matchClass = isMatch ? ' motion-match' : '';
            // 해당 시간대의 날씨 목록을 이모지+텍스트로 나열
            const weatherStr = weathers.map(w => `${weatherIcons[w] || ''}${w}`).join(' ');
            return `<span class="motion-badge${matchClass}">${time} · ${weatherStr}</span>`;
        }).join('');
    }

    function displayResults(birdes) {
        const resultsDiv = document.getElementById('results');

        if (birdes.length === 0) {
            resultsDiv.innerHTML = '<div class="no-results">⚠️ 현재 조건에서 잡을 수 있는 새가 없어요!</div>';
            return;
        }

        const sortedbirdes = sortbird(birdes, currentSort.column, currentSort.order);

        let html = `
                <div class="habitat-group">
                    <div class="habitat-header">
                        <span>검색 결과</span>
                        <span class="count-badge">${sortedbirdes.length} 종</span>
                    </div>
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <!-- 새 이미지 컬럼 -->
                                    <th class="col-fish-img">이미지</th>
                                    <th class="sortable ${currentSort.column === 'name' ? 'sort-' + currentSort.order : ''}" onclick="handleSort('name')">이름</th>
                                    <th class="sortable col-habitat-bird ${currentSort.column === 'habitat' ? 'sort-' + currentSort.order : ''}" onclick="handleSort('habitat')">서식지</th>
                                    <th class="sortable col-level ${currentSort.column === 'level' ? 'sort-' + currentSort.order : ''}" onclick="handleSort('level')">레벨</th>
                                    <th class="sortable ${currentSort.column === 'price' ? 'sort-' + currentSort.order : ''}" onclick="handleSort('price')">판매가 (등급별)</th>
                                    <th class="col-time">출현 시간</th>
                                    <th class="col-weather">날씨 조건</th>
                                    <th class="motion-cell" title="현재 조건 일치 시 초록 하이라이트">3⭐ 깃털 다듬기</th>
                                    <th class="motion-cell" title="현재 조건 일치 시 초록 하이라이트">4⭐ 날개 펼치기</th>
                                </tr>
                            </thead>
                            <tbody>`;

        // 현재 선택된 시간·날씨 (하이라이트 기준)
        const currentTime    = document.getElementById('time').value;
        const currentWeather = document.getElementById('weather').value;

        sortedbirdes.forEach(bird => {
            // --- 시간 표시 로직 ---
            const allTimes = ['아침', '낮', '저녁', '새벽'];
            const isAlwaysTime = bird.timeAll || (bird.time && allTimes.every(t => bird.time.includes(t)));
            const timeDisplay = isAlwaysTime
                ? '<span class="time-badge always">종일</span>'
                : bird.time.map(t => `<span class="time-badge">${t}</span>`).join(' ');

            // --- 날씨 표시 로직 ---
            const allWeathers = ['맑음', '비', '무지개'];
            const isAlwaysWeather = bird.weatherAll || (bird.weather && allWeathers.every(w => bird.weather.includes(w)));
            const weatherDisplay = isAlwaysWeather
                ? '<span class="weather-badge always">항상</span>'
                : bird.weather.map(w => `<span class="weather-badge">${w}</span>`).join(' ');

            // --- 이미지 표시 로직 ---
            // image 필드가 있으면 썸네일, 없으면 새 이모지 자리표시자
            const imgCell = bird.image
                ? `<img class="fish-thumb"
                        src="../../../public/images/bird_img/bird${bird.image}.webp"
                        alt="${bird.name}"
                        onerror="handleBirdImgError(this)">`
                : `<div class="fish-thumb-placeholder">🐦</div>`;

            html += `
                    <tr>
                        <td class="col-fish-img">${imgCell}</td>
                        <td class="item-name">${getSpecialIcon(bird.special)}${bird.name}</td>
                        <td class="col-habitat-bird">${getHabitatIcon(bird.habitat)}${bird.habitat}</td>
                        <td><span class="level-badge">Lv.${bird.level}</span></td>
                        <td>
                            <div class="price-cell">
                                <span>⭐</span>
                                <!-- 3성이 JSON price 기준값이므로 selected를 3성으로 설정 -->
                                <select class="star-selector" onchange="updatePrice('${bird.name}', ${bird.price}, this)">
                                    <option value="1">1성</option>
                                    <option value="2">2성</option>
                                    <option value="3" selected>3성</option>
                                    <option value="4">4성</option>
                                    <option value="5">5성</option>
                                </select>
                                <!-- 초기 표시: bird.price = 3성 기준값 (배율 1 적용) -->
                                <span class="price">₩${bird.price}</span>
                            </div>
                        </td>
                        <td>${timeDisplay}</td>
                        <td>${weatherDisplay}</td>
                        <td class="motion-cell">${formatMotion(bird.motion_preening, currentTime, currentWeather)}</td>
                        <td class="motion-cell">${formatMotion(bird.motion_wingspread, currentTime, currentWeather)}</td>
                    </tr>`;
        });

        html += `</tbody></table></div></div>`;
        resultsDiv.innerHTML = html;
    }

    /**
     * 새 이미지 로드 실패 시 이모지 자리표시자로 교체
     * @param {HTMLImageElement} img
     */
    function handleBirdImgError(img) {
        const placeholder = document.createElement('div');
        placeholder.className = 'fish-thumb-placeholder';
        placeholder.textContent = '🐦';
        img.parentNode.replaceChild(placeholder, img);
    }

    // 시간 선택을 먼저 하고 데이터를 로드하도록 변경
    window.onload = async function () {
        setInitialTimeOption();
        await loadbirdData();
    };
</script>
</body>
</html>
