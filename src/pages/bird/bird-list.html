<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>조류 도감 - 두근두근타운</title>
    <link href="../../css/common.css" rel="stylesheet">

    <!-- 방문자 추적 스크립트 (로컬 localStorage 기록용) -->
    <script src="../../js/tracker.js"></script>
</head>
<body>
<div id="header-placeholder"></div>

<main>
    <div class="page-header">
        <nav>
            <ul>
                <li><a href="bird-finder.html">새 찾기</a></li>
            </ul>
        </nav>
        <h1>🐦 조류 도감</h1>
        <p>두근두근타운의 모든 새 정보를 확인하세요</p>
    </div>

    <div class="stats" id="stats">
        <div class="stat-card">
            <div class="number">-</div>
            <div class="label">총 새 종류</div>
        </div>
        <div class="stat-card">
            <div class="number">-</div>
            <div class="label">서식지 종류</div>
        </div>
        <div class="stat-card">
            <div class="number">-</div>
            <div class="label">최고 판매가</div>
        </div>
    </div>

    <div class="filter-section">
        <h2>🔍 필터</h2>

        <div class="search-box">
            <label for="birdSearch">🐦 새 이름 검색</label>
            <input id="birdSearch" oninput="applyFilters()" placeholder="예: 비둘기, 앵무, 홍학..." type="text">
        </div>

        <div class="filter-groups">
            <div class="filter-group">
                <h3>⏰ 출현 시간</h3>
                <div class="checkbox-group">
                    <label class="checkbox-label">
                        <input onchange="applyFilters()" type="checkbox" value="아침"> 🌅 아침
                    </label>
                    <label class="checkbox-label">
                        <input onchange="applyFilters()" type="checkbox" value="낮"> ☀️ 낮
                    </label>
                    <label class="checkbox-label">
                        <input onchange="applyFilters()" type="checkbox" value="저녁"> 🌇 저녁
                    </label>
                    <label class="checkbox-label">
                        <input onchange="applyFilters()" type="checkbox" value="새벽"> 🌙 새벽
                    </label>
                </div>
            </div>

            <div class="filter-group">
                <h3>🌤️ 포함할 날씨</h3>
                <div class="checkbox-group">
                    <label class="checkbox-label">
                        <input onchange="applyFilters()" type="checkbox" value="맑음"> ☀️ 맑음
                    </label>
                    <label class="checkbox-label">
                        <input onchange="applyFilters()" type="checkbox" value="비"> 🌧️ 비
                    </label>
                    <label class="checkbox-label">
                        <input onchange="applyFilters()" type="checkbox" value="무지개"> 🌈 무지개
                    </label>
                </div>
            </div>

            <div class="filter-group">
                <h3>🔒 전용 날씨</h3>
                <div class="checkbox-group">
                    <label class="checkbox-label">
                        <input id="sunnyOnly" onchange="applyFilters()" type="checkbox"> ☀️ 맑음에만 등장
                    </label>
                    <label class="checkbox-label">
                        <input id="rainyOnly" onchange="applyFilters()" type="checkbox"> 🌧️ 비에만 등장
                    </label>
                    <label class="checkbox-label">
                        <input id="rainbowOnly" onchange="applyFilters()" type="checkbox"> 🌈 무지개에만 등장
                    </label>
                </div>
            </div>

            <div class="filter-actions">
                <!-- 빙설 시즌: season_ice/season_ice_bird.json 을 현재 목록에 병합 -->
                <button class="filter-btn season-ice-btn" onclick="loadSeasonData('season_ice/season_ice_bird.json')">❄️ 빙설 시즌 추가</button>
                <!-- 꿈의 명암 시즌: season_dreamlight_bird.json 을 현재 목록에 병합 -->
                 <button class="filter-btn season-dreamlight-btn" onclick="loadSeasonData('season_dreamlight/season_dreamlight_bird.json')">🌙 꿈의 명암 추가</button>
                <button class="filter-btn season-blocktown-btn" onclick="loadSeasonData('season_blocktown/season_blocktown_bird.json')">🧱 블록 시가지 추가</button>
                <!-- 로드된 모든 시즌 데이터를 제거하고 기본 데이터로 복원 -->
                <button class="filter-btn-reset" onclick="removeSeasonData()">🗑️ 시즌 데이터 제거</button>
                <button class="filter-btn" onclick="selectAllTime()">시간 전체선택</button>
                <button class="filter-btn" onclick="selectAllWeather()">날씨 전체선택</button>
                <button class="filter-btn-reset" onclick="resetFilters()">필터 초기화</button>
                <!-- 수집 완료 항목 숨기기/보이기 토글 버튼 -->
                <button class="filter-btn" id="hideCollectedBtn" onclick="toggleHideCollected()">수집 완료 숨기기</button>
                <!-- 수집 체크 전체 초기화 버튼 -->
                <button class="filter-btn-reset" onclick="resetCollected()">🗑️ 수집 초기화</button>
            </div>
        </div>
    </div>

    <div class="habitat-section" id="content">
        <div class="loading">🐦 새 정보를 불러오는 중...</div>
    </div>
</main>

<div id="footer-placeholder"></div>

<script src="../../js/common.js"></script>

<script>
    /** @type {Array<Object>} 로드된 새 데이터 배열 */
    let birdData = [];

    // ============================================================
    // 도감 수집 체크 관련
    // ============================================================
    const BIRD_COLLECTED_KEY = 'collected_bird';
    let collectedBird = new Set(JSON.parse(localStorage.getItem(BIRD_COLLECTED_KEY) || '[]'));
    let hideCollected = false;

    function toggleCollected(name) {
        if (collectedBird.has(name)) {
            collectedBird.delete(name);
        } else {
            collectedBird.add(name);
        }
        localStorage.setItem(BIRD_COLLECTED_KEY, JSON.stringify([...collectedBird]));
        displayAllbirds();
    }

    function toggleHideCollected() {
        hideCollected = !hideCollected;
        const btn = document.getElementById('hideCollectedBtn');
        btn.textContent = hideCollected ? '수집 완료 보이기' : '수집 완료 숨기기';
        displayAllbirds();
    }

    function resetCollected() {
        if (!confirm('수집 체크를 모두 초기화할까요?')) return;
        collectedBird.clear();
        localStorage.removeItem(BIRD_COLLECTED_KEY);
        displayAllbirds();
    }

    /** @type {Object} 현재 정렬 기준 {column, order} */
    let currentSort = {column: 'price', order: 'desc'};

    /** @type {Set<string>} 로드된 시즌 파일명 집합 (중복 방지) */
    let loadedSeasons = new Set();

    /**
     * 등급(성)별 판매가 배율 테이블
     * JSON의 price 값은 2성 기준 → 2성 배율을 1로 설정
     * 1성: 25%  2성: 100%(기준)  3성: 200%  4성: 400%  5성: 800%
     */
    const starMultipliers = {
        1: 0.25,
        2: 1,
        3: 2,
        4: 4,
        5: 8
    };

    /** 시간대 이모지 맵 */
    // const timeIcons    = { '아침': '🌅', '낮': '☀️', '저녁': '🌆', '새벽': '🌙' };
    /** 날씨 이모지 맵 */
    const weatherIcons = { '맑음': '☀️', '비': '🌧️', '무지개': '🌈' };

    async function loadbirdData() {
        try {
            let response = await fetch('../../data/bird_data.json');

            if (!response.ok) {
                response = await fetch('./bird_data.json');
            }

            if (!response.ok) {
                throw new Error('bird_data.json 파일을 찾을 수 없습니다.');
            }

            birdData = await response.json();
            console.log('새 데이터 로드 성공:', birdData.length + '종');
            displayStats();
            displayAllbirds();
        } catch (error) {
            console.error('데이터 로드 에러:', error);
            document.getElementById('content').innerHTML =
                `<div class="error">❌ 데이터 파일을 불러올 수 없습니다.</div>`;
        }
    }

    async function loadSeasonData(filename) {
        if (loadedSeasons.has(filename)) {
            alert('이미 추가된 시즌입니다.');
            return;
        }

        try {
            // filename 에 서브폴더 경로 포함 (예: season_ice/season_ice_bird.json)
            let response = await fetch(`../../data/${filename}`);

            if (!response.ok) {
                throw new Error(`${filename} 파일을 찾을 수 없습니다.`);
            }

            const seasonData = await response.json();

            // 이름 기준 중복 제거하며 병합
            const combined = [...birdData, ...seasonData];
            birdData = combined.filter((bird, index, self) =>
                index === self.findIndex((b) => b.name === bird.name)
            );

            loadedSeasons.add(filename);

            alert(`${seasonData.length}종의 시즌 데이터가 병합되었습니다.\n(총 ${birdData.length}종)`);
            displayStats();
            displayAllbirds();
        } catch (error) {
            console.error('시즌 데이터 로드 에러:', error);
            alert(`시즌 데이터를 불러오지 못했습니다.\n${error.message}`);
        }
    }

    async function removeSeasonData() {
        if (loadedSeasons.size === 0) {
            alert('제거할 시즌 데이터가 없습니다.');
            return;
        }

        try {
            let response = await fetch('../../data/bird_data.json');
            if (!response.ok) {
                response = await fetch('./bird_data.json');
            }

            if (!response.ok) {
                throw new Error('bird_data.json 파일을 찾을 수 없습니다.');
            }

            birdData = await response.json();
            loadedSeasons.clear();

            alert('모든 시즌 데이터가 제거되었습니다.\n기본 데이터만 표시됩니다.');
            displayStats();
            displayAllbirds();
        } catch (error) {
            console.error('데이터 초기화 에러:', error);
            alert('데이터를 초기화하지 못했습니다.');
        }
    }

    function getSelectedFilters() {
        const timeCheckboxes = document.querySelectorAll('.filter-group:nth-child(1) input[type="checkbox"]:checked');
        const weatherCheckboxes = document.querySelectorAll('.filter-group:nth-child(2) input[type="checkbox"]:checked');
        const rainbowOnly = document.getElementById('rainbowOnly')?.checked || false;
        const sunnyOnly = document.getElementById('sunnyOnly')?.checked || false;
        const rainyOnly = document.getElementById('rainyOnly')?.checked || false;
        const searchText = document.getElementById('birdSearch')?.value.trim().toLowerCase() || '';

        return {
            times: Array.from(timeCheckboxes).map(cb => cb.value),
            weathers: Array.from(weatherCheckboxes).map(cb => cb.value),
            rainbowOnly: rainbowOnly,
            sunnyOnly: sunnyOnly,
            rainyOnly: rainyOnly,
            searchText: searchText
        };
    }

    function applyFilters() {
        displayAllbirds();
    }

    function selectAllTime() {
        const checkboxes = document.querySelectorAll('.filter-group:nth-child(1) input[type="checkbox"]');
        checkboxes.forEach(cb => cb.checked = true);
        applyFilters();
    }

    function selectAllWeather() {
        const checkboxes = document.querySelectorAll('.filter-group:nth-child(2) input[type="checkbox"]');
        checkboxes.forEach(cb => {
            if (!cb.id.includes('Only')) {
                cb.checked = true;
            }
        });
        applyFilters();
    }

    function resetFilters() {
        const allCheckboxes = document.querySelectorAll('input[type="checkbox"]');
        allCheckboxes.forEach(cb => cb.checked = false);
        document.getElementById('birdSearch').value = '';
        applyFilters();
    }

    function displayStats() {
        const totalbirds = birdData.length;
        const habitats = [...new Set(birdData.map(b => b.habitat))].length;
        const maxPrice = Math.max(...birdData.map(b => b.price));

        const statsHTML = `
            <div class="stat-card">
                <div class="number">${totalbirds}</div>
                <div class="label">총 새 종류</div>
            </div>
            <div class="stat-card">
                <div class="number">${habitats}</div>
                <div class="label">서식지 종류</div>
            </div>
            <div class="stat-card">
                <div class="number">₩${maxPrice}</div>
                <div class="label">최고 판매가</div>
            </div>
            <div class="stat-card">
                <div class="number">${collectedBird.size} / ${totalbirds}</div>
                <div class="label">수집 완료</div>
            </div>
        `;
        document.getElementById('stats').innerHTML = statsHTML;
    }

    /**
     * 새 배열을 지정 열·방향으로 정렬 (원본 불변)
     * preening/wingspread는 총 조건 수 기준 정렬 (조건 많은 것 우선)
     *
     * @param {Array<Object>} birds
     * @param {string} column - 'name'|'habitat'|'level'|'price'|'preening'|'wingspread'
     * @param {string} order  - 'asc'|'desc'
     * @returns {Array<Object>}
     */
    function sortbirds(birds, column, order) {
        return [...birds].sort((a, b) => {
            let valueA, valueB;

            if (column === 'name' || column === 'habitat') {
                valueA = column === 'name' ? a.name : a.habitat;
                valueB = column === 'name' ? b.name : b.habitat;
                return order === 'asc'
                    ? valueA.localeCompare(valueB, 'ko')
                    : valueB.localeCompare(valueA, 'ko');
            } else if (column === 'level') {
                valueA = a.level;
                valueB = b.level;
            } else if (column === 'price') {
                valueA = a.price;
                valueB = b.price;
            }

            return order === 'asc' ? valueA - valueB : valueB - valueA;
        });
    }

    function handleSort(column) {
        if (currentSort.column === column) {
            currentSort.order = currentSort.order === 'asc' ? 'desc' : 'asc';
        } else {
            currentSort.column = column;
            currentSort.order = 'asc';
        }
        displayAllbirds();
    }

    function updatePrice(birdName, basePrice, selectElement) {
        const star = parseInt(selectElement.value);
        const multiplier = starMultipliers[star];
        const calculatedPrice = Math.floor(basePrice * multiplier);

        const priceSpan = selectElement.parentElement.querySelector('.price');
        priceSpan.textContent = `₩${calculatedPrice}`;
    }

    function displayAllbirds() {
        const filters = getSelectedFilters();
        let filteredbirds = birdData;

        // 이름 검색 필터
        if (filters.searchText) {
            filteredbirds = filteredbirds.filter(bird => {
                return bird.name.toLowerCase().includes(filters.searchText);
            });
        }

        // 수집 완료 숨기기 필터
        if (hideCollected) {
            filteredbirds = filteredbirds.filter(bird => !collectedBird.has(bird.name));
        }

        // 시간 필터
        if (filters.times.length > 0) {
            filteredbirds = filteredbirds.filter(bird => {
                if (!bird.time || bird.time.length === 0) return false;
                return bird.time.some(t => filters.times.includes(t));
            });
        }

        // 날씨 필터 로직
        if (filters.rainbowOnly) {
            filteredbirds = filteredbirds.filter(bird => {
                if (!bird.weather || bird.weather.length === 0) return false;
                return bird.weather.length === 1 && bird.weather[0] === "무지개";
            });
        } else if (filters.sunnyOnly) {
            filteredbirds = filteredbirds.filter(bird => {
                if (!bird.weather || bird.weather.length === 0) return false;
                return bird.weather.includes("맑음") && !bird.weather.includes("비");
            });
        } else if (filters.rainyOnly) {
            filteredbirds = filteredbirds.filter(bird => {
                if (!bird.weather || bird.weather.length === 0) return false;
                return bird.weather.includes("비") && !bird.weather.includes("맑음");
            });
        } else if (filters.weathers.length > 0) {
            filteredbirds = filteredbirds.filter(bird => {
                if (!bird.weather || bird.weather.length === 0) return false;
                return bird.weather.some(w => filters.weathers.includes(w));
            });
        }

        const sortedbirds = sortbirds(filteredbirds, currentSort.column, currentSort.order);

        let html = `
            <div class="habitat-group">
                <div class="habitat-header">
                    <span>전체 새 목록</span>
                    <span class="count-badge">${sortedbirds.length}종</span>
                </div>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <!-- 수집 체크 컬럼 -->
                                <th class="col-collect">수집</th>
                                <!-- 새 이미지 컬럼 -->
                                <th class="col-fish-img">이미지</th>
                                <th class="sortable ${currentSort.column === 'name' ? 'sort-' + currentSort.order : ''}"
                                    onclick="handleSort('name')">이름</th>
                                <th class="sortable col-habitat-bird ${currentSort.column === 'habitat' ? 'sort-' + currentSort.order : ''}"
                                    onclick="handleSort('habitat')">서식지</th>
                                <th class="sortable col-level ${currentSort.column === 'level' ? 'sort-' + currentSort.order : ''}"
                                    onclick="handleSort('level')">레벨</th>
                                <th class="sortable ${currentSort.column === 'price' ? 'sort-' + currentSort.order : ''}"
                                    onclick="handleSort('price')">판매가</th>
                                <th class="col-time">출현 시간</th>
                                <th class="col-weather">날씨 조건</th>
                                <th class="motion-cell" title="무지개는 날씨의 상위 호환이므로 시간대의 날씨 데이터가 존재한다면 무지개 또한 해당됨">3⭐ 깃털 다듬기</th>
                                <th class="motion-cell" title="무지개는 날씨의 상위 호환이므로 시간대의 날씨 데이터가 존재한다면 무지개 또한 해당됨">4⭐ 날개 펼치기</th>
                            </tr>
                        </thead>
                        <tbody>
        `;

        sortedbirds.forEach(bird => {
            // 시간 표시 로직
            const allTimes = ['아침', '낮', '저녁', '새벽'];
            const isAlwaysTime = bird.timeAll || (bird.time && allTimes.every(t => bird.time.includes(t)));
            const timeDisplay = isAlwaysTime
                ? '<span class="time-badge always">종일</span>'
                : bird.time.map(t => `<span class="time-badge">${t}</span>`).join(' ');

            // 날씨 표시 로직
            const allWeathers = ['맑음', '비', '무지개'];
            const isAlwaysWeather = bird.weatherAll || (bird.weather && allWeathers.every(w => bird.weather.includes(w)));
            const weatherDisplay = isAlwaysWeather
                ? '<span class="weather-badge always">항상</span>'
                : bird.weather.map(w => `<span class="weather-badge">${w}</span>`).join(' ');

            // 이미지 표시 로직
            // image 필드가 있으면 썸네일, 없으면 새 이모지 자리표시자
            const imgCell = bird.image
                ? `<img class="fish-thumb"
                        src="../../../public/images/bird_img/bird${bird.image}.webp"
                        alt="${bird.name}"
                        onerror="handleBirdImgError(this)">`
                : `<div class="fish-thumb-placeholder">🐦</div>`;

            // 수집 완료 여부
            const isCollected = collectedBird.has(bird.name);

            html += `
            <tr class="${isCollected ? 'collected-row' : ''}">
                <td class="col-collect">
                    <input type="checkbox"
                           ${isCollected ? 'checked' : ''}
                           onchange="toggleCollected('${bird.name.replace(/'/g, "\\'")}')">
                </td>
                <td class="col-fish-img">${imgCell}</td>
                <td class="item-name">${getSpecialIcon(bird.special)}${bird.name}</td>
                <td class="col-habitat-bird">${getHabitatIcon(bird.habitat)} ${bird.habitat}</td>
                <td><span class="level-badge">Lv.${bird.level}</span></td>
                <td><div class="price-cell">
                    <span>⭐</span>
                    <!-- 2성이 JSON price 기준값이므로 selected를 2성으로 설정 -->
                    <select class="star-selector" onchange="updatePrice('${bird.name}', ${bird.price}, this)">
                        <option value="1">1성</option>
                        <option value="2" selected>2성</option>
                        <option value="3">3성</option>
                        <option value="4">4성</option>
                        <option value="5">5성</option>
                    </select>
                    <!-- 초기 표시: bird.price = 2성 기준값 (배율 1 적용) -->
                    <span class="price">₩${bird.price}</span>
                </div></td>
                <td>${timeDisplay}</td>
                <td>${weatherDisplay}</td>
                <td class="motion-cell">${formatMotion(bird.motion_preening)}</td>
                <td class="motion-cell">${formatMotion(bird.motion_wingspread)}</td>
            </tr>
        `;
        });

        html += `
                        </tbody>
                    </table>
                </div>
            </div>
        `;

        document.getElementById('content').innerHTML = html;
    }

    /**
     * special 값에 따른 아이콘 반환
     * JSON 실제 값: false | "특수" | "보너스 스테이지" | "희귀" | "빙설" | "꿈의 명암"
     * 새 시즌이 추가되면 icons 맵에 키-이모지 쌍을 추가하면 됩니다.
     */
    function getSpecialIcon(special) {
        const icons = {
            '특수':          '🌟',
            '보너스 스테이지': '🎁',
            '희귀':          '💎',
            '빙설':          '❄️',
            '빙설 시즌':      '❄️',  // 구버전 데이터 호환
            '꿈의 명암':      '🌙',
            '블록 시가지':    '🧱',
        };
        return icons[special] || '';
    }

    /**
     * 이벤트성 서식지에 아이콘 부여
     */
    function getHabitatIcon(habitat) {
        const icons = {
            '새들의 복귀 사건': '🎯',
            '겨울 기록 채집 사건': '❄️'
        };
        return icons[habitat] || '';
    }

    /**
     * motion 객체를 HTML 뱃지 문자열로 변환 (list용 - 하이라이트 없음)
     *
     * @param {Object|null} motionObj - { 시간: [날씨, ...], ... } 형태 또는 null
     * @returns {string} HTML 문자열
     */
    function formatMotion(motionObj) {
        if (!motionObj) return '<span class="motion-none">-</span>';

        const entries = Object.entries(motionObj);
        if (entries.length === 0) return '<span class="motion-none">-</span>';

        return entries.map(([time, weathers]) => {
            const weatherStr = weathers.map(w => `${weatherIcons[w] || ''}${w}`).join(' ');
            return `<span class="motion-badge">${time} · ${weatherStr}</span>`;
        }).join('');
    }

    /**
     * 새 이미지 로드 실패 시 이모지 자리표시자로 교체
     * @param {HTMLImageElement} img
     */
    function handleBirdImgError(img) {
        const placeholder = document.createElement('div');
        placeholder.className = 'fish-thumb-placeholder';
        placeholder.textContent = '🐦';
        img.parentNode.replaceChild(placeholder, img);
    }

    window.onload = loadbirdData;
</script>
</body>
</html>
