<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>작물 도감 - 두근두근타운</title>
    <link href="../../css/common.css" rel="stylesheet">
    <style>
        /* ── 작물 도감 전용 컬럼 너비 ── */
        .col-seed    { width: 140px; min-width: 140px; }
        .col-harvest { width: 120px; min-width: 140px; }
        .col-profit  { width: 180px; min-width: 180px; }

        /* 이윤 셀 컬러 */
        .profit-positive { color: #4caf50; font-weight: 600; }
        .profit-negative { color: #e53935; font-weight: 600; }

        /* 빙설 시즌 작물 뱃지 */
        .season-badge {
            display: inline-block;
            background: #e3f2fd;
            color: #1565c0;
            font-size: 0.78em;
            padding: 2px 7px;
            border-radius: 8px;
            margin-left: 4px;
            font-weight: 600;
        }

        /* 수확 시간 뱃지 */
        .harvest-badge {
            display: inline-block;
            background: var(--color-surface-light);
            color: var(--color-text-soft);
            padding: 3px 8px;
            border-radius: 8px;
            font-size: 0.9em;
        }

        /* 필터 섹션: 검색창 + 버튼 수평 배치 */
        .crops-filter-row {
            display: flex;
            flex-wrap: wrap;    /* 모바일에서 줄바꿈 허용 */
            gap: 12px 20px;
            align-items: flex-end;
        }

        /* 검색창이 남은 공간 채우도록 */
        .crops-filter-row .search-box {
            flex: 1;
            min-width: 200px;   /* 너무 좁아지지 않게 최소 너비 */
            margin-bottom: 0;
        }

        /* 버튼 그룹: 공통 filter-actions(row 방향) 그대로 사용 */
        .crops-filter-row .filter-actions {
            flex-shrink: 0;
        }

        /* ── 작물 이미지 썸네일 ── */
        .col-img { width: 60px; min-width: 60px; text-align: center; }

        .crop-img {
            width: 44px;
            height: 44px;
            object-fit: contain;
            image-rendering: pixelated; /* 픽셀 아트 스타일 선명하게 */
            vertical-align: middle;
        }

        /* 이미지 없는 경우 빈 셀 자리 유지 */
        .crop-img-placeholder {
            display: inline-block;
            width: 44px;
            height: 44px;
        }
</style>

    <!-- 방문자 추적 스크립트 (로컬 localStorage 기록용) -->
    <script src="../../../src/js/tracker.js"></script>
</head>
<body>
<div id="header-placeholder"></div>

<main>
    <!-- ── 페이지 헤더 ── -->
    <div class="page-header">
        <nav>
            <ul>
                <li><a href="../recipe/recipe.html">🍳 요리 레시피</a></li>
            </ul>
        </nav>
        <h1>🌱 작물 도감</h1>
        <p>두근두근타운의 모든 작물 정보를 확인하세요</p>
    </div>

    <!-- ── 통계 카드 ── -->
    <div class="stats" id="stats">
        <div class="stat-card">
            <div class="number">-</div>
            <div class="label">총 작물 종류</div>
        </div>
        <div class="stat-card">
            <div class="number">-</div>
            <div class="label">최단 수확 시간</div>
        </div>
        <div class="stat-card">
            <div class="number">-</div>
            <div class="label">최고 판매가 (1성)</div>
        </div>
        <div class="stat-card">
            <div class="number">-</div>
            <div class="label">최대 이윤 (1성)</div>
        </div>
    </div>

    <!-- ── 필터 섹션 ── -->
    <div class="filter-section">
        <h2>🔍 필터</h2>

        <!-- 검색창 + 버튼 수평 배치 -->
        <div class="crops-filter-row">

            <!-- 이름 검색 -->
            <div class="search-box">
                <label for="cropSearch">🌿 작물 이름 검색</label>
                <input id="cropSearch" oninput="applyFilters()" placeholder="예: 토마토, 밀, 딸기..." type="text">
            </div>

            <!-- 시즌 · 초기화 버튼 -->
            <div class="filter-actions">
                <!-- 빙설 시즌: season_ice/season_ice_crops.json 을 목록에 병합 -->
                <button class="filter-btn season-ice-btn" onclick="loadSeasonData('ice')">❄️ 빙설 시즌 추가</button>
                <!-- 꿈의 명암 시즌: season_dreamlight/season_dreamlight_crops.json 을 목록에 병합 -->
                <button class="filter-btn season-dreamlight-btn" onclick="loadSeasonData('dreamlight')">🌙 꿈의 명암 추가</button>
                <!-- 로드된 모든 시즌 데이터를 제거하고 기본 데이터로 복원 -->
                <button class="filter-btn season-blocktown-btn" onclick="loadSeasonData('blocktown')">🧱 블록 시가지 추가</button>
                <button class="filter-btn-reset" onclick="removeSeasonData()">🗑️ 시즌 데이터 제거</button>
                <button class="filter-btn-reset" onclick="resetFilters()">필터 초기화</button>
                <!-- 수집 완료 항목 숨기기/보이기 토글 버튼 -->
                <button class="filter-btn" id="hideCollectedBtn" onclick="toggleHideCollected()">수집 완료 숨기기</button>
                <!-- 수집 체크 전체 초기화 버튼 -->
                <button class="filter-btn-reset" onclick="resetCollected()">🗑️ 수집 초기화</button>
            </div>

        </div>
    </div>

    <!-- ── 테이블 영역 ── -->
    <div class="habitat-section" id="content">
        <div class="loading">🌱 작물 정보를 불러오는 중...</div>
    </div>
</main>

<div id="footer-placeholder"></div>

<script src="../../js/common.js"></script>
<script>
    /* ========================================================
       작물 이미지 경로 생성 — JSON의 image 필드를 사용
       (하드코딩 맵 제거: 새 작물 추가 시 엑셀/JSON만 수정하면 됨)
       페이지 위치: /src/pages/crops/  →  ../../../public/images/crop_img/
    ======================================================== */
    const CROP_IMG_BASE = '../../../public/images/crop_img/';

    /** crop.image 값이 있으면 경로 반환, 없으면 null */
    function getCropImgSrc(crop) {
        return crop.image ? `${CROP_IMG_BASE}${crop.image}.webp` : null;
    }

    /* ========================================================
       상태 변수
    ======================================================== */
    let cropsData   = [];       // 현재 화면에 표시 중인 데이터
    let baseData    = [];       // 원본 데이터 (시즌 제거 시 복원용)

    // ============================================================
    // 도감 수집 체크 관련
    // ============================================================
    const CROPS_COLLECTED_KEY = 'collected_crops';
    let collectedCrops = new Set(JSON.parse(localStorage.getItem(CROPS_COLLECTED_KEY) || '[]'));
    let hideCollected = false;

    function toggleCollected(name) {
        if (collectedCrops.has(name)) {
            collectedCrops.delete(name);
        } else {
            collectedCrops.add(name);
        }
        localStorage.setItem(CROPS_COLLECTED_KEY, JSON.stringify([...collectedCrops]));
        displayAllCrops();
    }

    function toggleHideCollected() {
        hideCollected = !hideCollected;
        const btn = document.getElementById('hideCollectedBtn');
        btn.textContent = hideCollected ? '수집 완료 보이기' : '수집 완료 숨기기';
        displayAllCrops();
    }

    function resetCollected() {
        if (!confirm('수집 체크를 모두 초기화할까요?')) return;
        collectedCrops.clear();
        localStorage.removeItem(CROPS_COLLECTED_KEY);
        displayAllCrops();
    }
    // 등급 배수 상수 (게임 고정값 — 시트에서 읽지 않음)
    const GRADE_SELL_MUL = { '1': 1.0, '2': 1.5, '3': 2.0, '4': 4.0, '5': 8.0 };
    // 시즌별 로드 여부 추적 — 새 시즌 추가 시 키만 늘리면 됩니다
    const seasonLoaded = {
        ice:        false,  // 빙설 시즌
        dreamlight: false,  // 꿈의 명암 시즌
        blocktown:  false,  // 블록 시가지 시즌
    };

    // 시즌 설정 테이블 — 새 시즌 추가 시 여기에만 항목 추가
    const SEASON_CONFIG = {
        ice: {
            label:    '빙설 시즌',
            emoji:    '❄️',
            jsonPath: '../../data/season_ice/season_ice_crops.json',
        },
        dreamlight: {
            label:    '꿈의 명암 시즌',
            emoji:    '🌙',
            jsonPath: '../../data/season_dreamlight/season_dreamlight_crops.json',
        },
        blocktown: {
            label:    '블록 시가지 시즌',
            emoji:    '🧱',
            jsonPath: '../../data/season_blocktown/season_blocktown_crops.json',
        },
    };
    let currentSort = { column: 'sellPrice', order: 'desc' };


    /* ========================================================
       초기 데이터 로드
    ======================================================== */
    async function loadCropsData() {
        try {
            const response = await fetch('../../data/crops.json');
            if (!response.ok) throw new Error('crops.json을 찾을 수 없습니다.');

            const json = await response.json();
            // 등급 배수는 GRADE_SELL_MUL 상수 사용
            baseData   = json.items;
            cropsData  = [...baseData];

            displayStats();
            displayAllCrops();
        } catch (error) {
            console.error('데이터 로드 오류:', error);
            document.getElementById('content').innerHTML =
                `<div class="error">❌ 데이터 파일을 불러올 수 없습니다.</div>`;
        }
    }


    /* ========================================================
       시즌 데이터 추가 / 제거
       season: 'ice' | 'dreamlight' (SEASON_CONFIG 의 키)
       새 시즌이 생기면 SEASON_CONFIG 에 항목 추가만 하면 됩니다.
    ======================================================== */
    async function loadSeasonData(season) {
        const cfg = SEASON_CONFIG[season];
        if (!cfg) { console.error('알 수 없는 시즌:', season); return; }
        if (seasonLoaded[season]) {
            alert(`이미 ${cfg.label} 데이터가 추가되어 있습니다.`);
            return;
        }

        try {
            const response = await fetch(cfg.jsonPath);
            if (!response.ok) throw new Error(`${cfg.jsonPath} 파일을 찾을 수 없습니다.`);

            const json     = await response.json();
            // 시즌 아이템에 isSeason 플래그 + 시즌 라벨/이모지 추가 (뱃지 표시용)
            // seasonLabel/seasonEmoji 를 함께 저장해야 빙설/꿈의 명암 구분 가능
            const seasonItems = json.items.map(item => ({
                ...item,
                isSeason:     true,
                seasonLabel:  cfg.label,   // 예: '빙설 시즌', '꿈의 명암 시즌'
                seasonEmoji:  cfg.emoji,   // 예: '❄️', '🌙'
            }));

            // 이름 기준 중복 제거 후 병합
            const combined = [...cropsData, ...seasonItems];
            cropsData = combined.filter((item, idx, self) =>
                idx === self.findIndex(c => c.name === item.name)
            );

            seasonLoaded[season] = true;
            alert(`${cfg.emoji} ${cfg.label} 작물 ${seasonItems.length}종이 추가되었습니다. (총 ${cropsData.length}종)`);
            displayStats();
            displayAllCrops();
        } catch (error) {
            console.error('시즌 데이터 로드 오류:', error);
            alert(`시즌 데이터를 불러오지 못했습니다.\n${error.message}`);
        }
    }

    // 로드된 모든 시즌을 제거하고 기본 데이터로 복원
    async function removeSeasonData() {
        const anyLoaded = Object.values(seasonLoaded).some(v => v);
        if (!anyLoaded) { alert('제거할 시즌 데이터가 없습니다.'); return; }

        cropsData = [...baseData];
        for (const key of Object.keys(seasonLoaded)) { seasonLoaded[key] = false; }
        alert('모든 시즌 데이터가 제거되었습니다.');
        displayStats();
        displayAllCrops();
    }


    /* ========================================================
       필터 / 검색
    ======================================================== */
    function getSearchText() {
        return document.getElementById('cropSearch')?.value.trim().toLowerCase() || '';
    }

    function applyFilters() { displayAllCrops(); }

    function resetFilters() {
        document.getElementById('cropSearch').value = '';
        applyFilters();
    }


    /* ========================================================
       정렬
    ======================================================== */
    function handleSort(column) {
        if (currentSort.column === column) {
            currentSort.order = currentSort.order === 'asc' ? 'desc' : 'asc';
        } else {
            currentSort.column = column;
            currentSort.order = 'asc';
        }
        displayAllCrops();
    }

    function sortCrops(list, column, order) {
        return [...list].sort((a, b) => {
            let va, vb;
            if (column === 'name') {
                return order === 'asc'
                    ? a.name.localeCompare(b.name, 'ko')
                    : b.name.localeCompare(a.name, 'ko');
            }
            if (column === 'profit') {
                va = a.sellPrice - a.seedPrice;
                vb = b.sellPrice - b.seedPrice;
            } else if (column === 'profitPerHour') {
                // 시간 대비 이윤: 이윤 ÷ 수확 시간(시간 단위)
                va = (a.sellPrice - a.seedPrice) / (a.harvestMinutes / 60);
                vb = (b.sellPrice - b.seedPrice) / (b.harvestMinutes / 60);
            } else {
                va = a[column];
                vb = b[column];
            }
            return order === 'asc' ? va - vb : vb - va;
        });
    }


    /* ========================================================
       통계 카드 렌더링
    ======================================================== */
    function displayStats() {
        const total    = cropsData.length;
        const minTime  = Math.min(...cropsData.map(c => c.harvestMinutes));
        const maxSell  = Math.max(...cropsData.map(c => c.sellPrice));
        const maxProfit = Math.max(...cropsData.map(c => c.sellPrice - c.seedPrice));

        document.getElementById('stats').innerHTML = `
            <div class="stat-card">
                <div class="number">${total}</div>
                <div class="label">총 작물 종류</div>
            </div>
            <div class="stat-card">
                <div class="number">${formatMinutes(minTime)}</div>
                <div class="label">최단 수확 시간</div>
            </div>
            <div class="stat-card">
                <div class="number">₩${maxSell.toLocaleString()}</div>
                <div class="label">최고 판매가 (1성)</div>
            </div>
            <div class="stat-card">
                <div class="number">₩${maxProfit.toLocaleString()}</div>
                <div class="label">최대 이윤 (1성)</div>
            </div>
            <div class="stat-card">
                <div class="number">${collectedCrops.size} / ${total}</div>
                <div class="label">수집 완료</div>
            </div>
        `;
    }


    /* ========================================================
       테이블 렌더링
    ======================================================== */
    function displayAllCrops() {
        const searchText = getSearchText();

        // 검색 필터
        let filtered = cropsData.filter(c =>
            !searchText || c.name.toLowerCase().includes(searchText)
        );

        // 수집 완료 숨기기 필터
        if (hideCollected) {
            filtered = filtered.filter(c => !collectedCrops.has(c.name));
        }

        const sorted = sortCrops(filtered, currentSort.column, currentSort.order);

        // 정렬 헤더 클래스 헬퍼
        const sc = (col) =>
            `sortable ${currentSort.column === col ? 'sort-' + currentSort.order : ''}`;

        let html = `
            <div class="habitat-group">
                <div class="habitat-header">
                    <span>🌱 전체 작물 목록</span>
                    <span class="count-badge">${sorted.length}종</span>
                </div>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <!-- 수집 체크 컬럼 -->
                                <th class="col-collect">수집</th>
                                <th class="col-img"></th>
                                <th class="${sc('name')}"             onclick="handleSort('name')">이름</th>
                                <th class="${sc('seedPrice')} col-seed"    onclick="handleSort('seedPrice')">씨앗 가격</th>
                                <th class="${sc('harvestMinutes')} col-harvest" onclick="handleSort('harvestMinutes')">수확 시간</th>
                                <th class="${sc('sellPrice')}"        onclick="handleSort('sellPrice')">판매가</th>
                                <th class="${sc('profit')} col-profit"     onclick="handleSort('profit')">이윤</th>
                                <th class="${sc('profitPerHour')} col-profit" onclick="handleSort('profitPerHour')">시간 대비 이윤</th>
                            </tr>
                        </thead>
                        <tbody>
        `;

        sorted.forEach(crop => {
            // 시즌 뱃지: isSeason 플래그 + 저장된 시즌 이모지/라벨 사용
            // (어느 시즌에서 로드됐는지 정확히 표시)
            const seasonTag = crop.isSeason
                ? `<span class="season-badge">${crop.seasonEmoji || '🗓️'} ${crop.seasonLabel || '시즌'}</span>`
                : '';

            // 1성 기준 이윤 · 시간 대비 이윤
            const baseProfit      = crop.sellPrice - crop.seedPrice;
            const profitClass     = baseProfit >= 0 ? 'profit-positive' : 'profit-negative';
            const profitSign      = baseProfit >= 0 ? '+' : '';
            const profitPerHour   = baseProfit / (crop.harvestMinutes / 60);
            const pphSign         = profitPerHour >= 0 ? '+' : '';
            const pphClass        = profitPerHour >= 0 ? 'profit-positive' : 'profit-negative';

            // 이미지: JSON의 image 필드로 경로 생성 (하드코딩 맵 불필요)
            const imgSrc = getCropImgSrc(crop);
            const imgTag = imgSrc
                ? `<img class="crop-img" src="${imgSrc}" alt="${crop.name}" onerror="this.parentElement.innerHTML='<span class=\\'crop-img-placeholder\\'></span>'">`
                : `<span class="crop-img-placeholder"></span>`;

            // 수집 완료 여부
            const isCollected = collectedCrops.has(crop.name);

            html += `
            <tr class="${isCollected ? 'collected-row' : ''}">
                <td class="col-collect">
                    <input type="checkbox"
                           ${isCollected ? 'checked' : ''}
                           onchange="toggleCollected('${crop.name.replace(/'/g, "\\'")}')">
                </td>
                <td class="col-img">${imgTag}</td>
                <td class="item-name">${crop.name}${seasonTag}</td>
                <td>₩${crop.seedPrice.toLocaleString()}</td>
                <td><span class="harvest-badge">⏱ ${formatMinutes(crop.harvestMinutes)}</span></td>
                <td>
                    <div class="price-cell">
                        <span>⭐</span>
                        <select class="star-selector"
                                onchange="updatePrice(${crop.sellPrice}, ${crop.seedPrice}, ${crop.harvestMinutes}, this)">
                            ${[1,2,3,4,5].map(s =>
                                `<option value="${s}">${s}성</option>`
                            ).join('')}
                        </select>
                        <span class="price">₩${crop.sellPrice.toLocaleString()}</span>
                    </div>
                </td>
                <td class="${profitClass}">${profitSign}₩${baseProfit.toLocaleString()}</td>
                <td class="${pphClass}">${pphSign}₩${Math.round(profitPerHour).toLocaleString()}/시간</td>
            </tr>`;
        });

        html += `
                        </tbody>
                    </table>
                </div>
            </div>`;

        if (sorted.length === 0) {
            html = `<div class="no-results">🌿 검색 결과가 없습니다.</div>`;
        }

        document.getElementById('content').innerHTML = html;
    }


    /* ========================================================
       성급 선택 시 판매가·이윤 갱신
    ======================================================== */
    function updatePrice(baseSellPrice, seedPrice, harvestMinutes, selectEl) {
        const star         = parseInt(selectEl.value);
        const multiplier   = GRADE_SELL_MUL[star] ?? 1;
        const adjusted     = Math.floor(baseSellPrice * multiplier);
        const profit       = adjusted - seedPrice;
        const profitSign   = profit >= 0 ? '+' : '';
        const profitPerHour = profit / (harvestMinutes / 60);
        const pphSign      = profitPerHour >= 0 ? '+' : '';

        const row = selectEl.closest('tr');
        const tds = row.querySelectorAll('td');

        // 판매가 업데이트
        row.querySelector('.price').textContent = `₩${adjusted.toLocaleString()}`;

        // 이윤 셀 업데이트 (td[6]: 수집 체크 컬럼 추가로 1칸 더 밀림)
        tds[6].textContent = `${profitSign}₩${profit.toLocaleString()}`;
        tds[6].className   = profit >= 0 ? 'profit-positive' : 'profit-negative';

        // 시간 대비 이윤 셀 업데이트 (td[7])
        tds[7].textContent = `${pphSign}₩${Math.round(profitPerHour).toLocaleString()}/시간`;
        tds[7].className   = profitPerHour >= 0 ? 'profit-positive' : 'profit-negative';
    }


    /* ========================================================
       유틸 - 분 → 시간 표시 변환
    ======================================================== */
    function formatMinutes(minutes) {
        if (minutes < 60) return `${minutes}분`;
        const h = Math.floor(minutes / 60);
        const m = minutes % 60;
        return m === 0 ? `${h}시간` : `${h}시간 ${m}분`;
    }


    /* ========================================================
       페이지 초기화
    ======================================================== */
    window.onload = loadCropsData;
</script>
</body>
</html>
