<!DOCTYPE html>
<html lang="ko">
<head>
    <script>
        // Google Analytics 4 초기화
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-RXTDCP8G1V');
    </script>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>어류 도감 - 두근두근타운</title>
    <link href="../../css/common.css" rel="stylesheet">

    <!-- 방문자 추적 스크립트 (로컬 localStorage 기록용) -->
    <script src="../../../src/js/tracker.js"></script>
</head>
<body>
<div id="header-placeholder"></div>

<main>
    <div class="page-header">
        <nav>
            <ul>
                <li><a href="fish-finder.html">물고기 찾기</a></li>
            </ul>
        </nav>
        <h1>🎣 어류 도감</h1>
        <p>두근두근타운의 모든 물고기 정보를 확인하세요</p>
    </div>

    <div class="stats" id="stats">
        <div class="stat-card">
            <div class="number">-</div>
            <div class="label">총 물고기 종류</div>
        </div>
        <div class="stat-card">
            <div class="number">-</div>
            <div class="label">서식지 종류</div>
        </div>
        <div class="stat-card">
            <div class="number">-</div>
            <div class="label">최고 판매가</div>
        </div>
    </div>

    <div class="filter-section">
        <h2>🔍 필터</h2>

        <div class="search-box">
            <label for="fishSearch">🐟 물고기 이름 검색</label>
            <input id="fishSearch" oninput="applyFilters()" placeholder="예: 연어, 배스, 붕어..." type="text">
        </div>

        <div class="filter-groups">
            <div class="filter-group" id="timeFilterGroup">
                <h3>⏰ 출현 시간</h3>
                <div class="checkbox-group">
                    <label class="checkbox-label">
                        <input onchange="applyFilters()" type="checkbox" value="아침"> 🌅 아침
                    </label>
                    <label class="checkbox-label">
                        <input onchange="applyFilters()" type="checkbox" value="낮"> ☀️ 낮
                    </label>
                    <label class="checkbox-label">
                        <input onchange="applyFilters()" type="checkbox" value="저녁"> 🌇 저녁
                    </label>
                    <label class="checkbox-label">
                        <input onchange="applyFilters()" type="checkbox" value="새벽"> 🌙 새벽
                    </label>
                </div>
            </div>

            <div class="filter-group fish-area-group" id="fishAreaFilterGroup">
                <h3>🧭 물고기 장소</h3>
                <div class="checkbox-group">
                    <label class="checkbox-label">
                        <input id="fishAreaAll" onchange="handleFishAreaAll(this)" type="checkbox" checked> 🌐 전체
                    </label>
                    <label class="checkbox-label">
                        <input class="fish-area-checkbox" onchange="handleFishAreaOption()" type="checkbox" value="river"> 🌊 강 물고기
                    </label>
                    <label class="checkbox-label">
                        <input class="fish-area-checkbox" onchange="handleFishAreaOption()" type="checkbox" value="lake"> 🏞️ 호수 물고기
                    </label>
                    <label class="checkbox-label">
                        <input class="fish-area-checkbox" onchange="handleFishAreaOption()" type="checkbox" value="sea"> ⚓ 바다 물고기
                    </label>
                </div>
            </div>

            <div class="filter-group" id="weatherFilterGroup">
                <h3>🌤️ 포함할 날씨</h3>
                <div class="checkbox-group">
                    <label class="checkbox-label">
                        <input onchange="applyFilters()" type="checkbox" value="맑음"> ☀️ 맑음
                    </label>
                    <label class="checkbox-label">
                        <input onchange="applyFilters()" type="checkbox" value="비"> 🌧️ 비
                    </label>
                    <label class="checkbox-label">
                        <input onchange="applyFilters()" type="checkbox" value="무지개"> 🌈 무지개
                    </label>
                </div>
            </div>

            <div class="filter-group" id="exclusiveWeatherFilterGroup">
                <h3>🔒 전용 날씨</h3>
                <div class="checkbox-group">
                    <label class="checkbox-label">
                        <input id="sunnyOnly" onchange="applyFilters()" type="checkbox"> ☀️ 맑음에만 등장
                    </label>
                    <label class="checkbox-label">
                        <input id="rainyOnly" onchange="applyFilters()" type="checkbox"> 🌧️ 비에만 등장
                    </label>
                    <label class="checkbox-label">
                        <input id="rainbowOnly" onchange="applyFilters()" type="checkbox"> 🌈 무지개에만 등장
                    </label>
                </div>
            </div>

            <div class="filter-actions">
                <!-- 빙설 시즌: season_ice/season_ice_fish.json 을 현재 목록에 병합 -->
                <button class="filter-btn season-ice-btn" onclick="loadSeasonData('season_ice/season_ice_fish.json')">❄️ 빙설 시즌 추가</button>
                <!-- 꿈의 명암 시즌: season_dreamlight/season_dreamlight_fish.json 을 현재 목록에 병합 -->
                <button class="filter-btn season-dreamlight-btn" onclick="loadSeasonData('season_dreamlight/season_dreamlight_fish.json')">🌙 꿈의 명암 추가</button>
                <button class="filter-btn season-blocktown-btn" onclick="loadSeasonData('season_blocktown/season_blocktown_fish.json')">🧱 블록 시가지 추가</button>
                <!-- 로드된 모든 시즌 데이터를 제거하고 기본 데이터로 복원 -->
                <button class="filter-btn-reset" onclick="removeSeasonData()">🗑️ 시즌 데이터 제거</button>
                <button class="filter-btn" onclick="selectAllTime()">시간 전체선택</button>
                <button class="filter-btn" onclick="selectAllWeather()">날씨 전체선택</button>
                <button class="filter-btn-reset" onclick="resetFilters()">필터 초기화</button>
                <!-- 수집 완료 항목 숨기기/보이기 토글 버튼 -->
                <button class="filter-btn" id="hideCollectedBtn" onclick="toggleHideCollected()">수집 완료 숨기기</button>
                <!-- 수집 체크 전체 초기화 버튼 -->
                <button class="filter-btn-reset" onclick="resetCollected()">🗑️ 수집 초기화</button>
            </div>
        </div>
    </div>

    <div class="habitat-section" id="content">
        <div class="loading">🐟 물고기 정보를 불러오는 중...</div>
    </div>
</main>

<div id="footer-placeholder"></div>

<script src="../../js/common.js"></script>

<script>
    let fishData = [];
    let currentSort = {column: 'price', order: 'desc'};
    let loadedSeasons = new Set(); // 이미 로드한 시즌 추적

    // ============================================================
    // 도감 수집 체크 관련
    // localStorage에 수집 완료 항목의 이름 목록을 저장/불러옴
    // ============================================================
    const FISH_COLLECTED_KEY = 'collected_fish'; // localStorage 키
    let collectedFish = new Set(JSON.parse(localStorage.getItem(FISH_COLLECTED_KEY) || '[]'));
    let hideCollected = false; // 수집 완료 항목 숨김 여부

    // 수집 체크 토글: 체크 시 저장, 해제 시 제거
    function toggleCollected(name) {
        if (collectedFish.has(name)) {
            collectedFish.delete(name);
        } else {
            collectedFish.add(name);
        }
        // 변경된 수집 목록을 localStorage에 저장
        localStorage.setItem(FISH_COLLECTED_KEY, JSON.stringify([...collectedFish]));
        displayAllFish();
    }

    // 수집 완료 항목 숨기기/보이기 토글
    function toggleHideCollected() {
        hideCollected = !hideCollected;
        const btn = document.getElementById('hideCollectedBtn');
        btn.textContent = hideCollected ? '수집 완료 보이기' : '수집 완료 숨기기';
        displayAllFish();
    }

    // 수집 체크 전체 초기화
    function resetCollected() {
        if (!confirm('수집 체크를 모두 초기화할까요?')) return;
        collectedFish.clear();
        localStorage.removeItem(FISH_COLLECTED_KEY);
        displayAllFish();
    }

    // 등급별 가격 배율
    const starMultipliers = {
        1: 1,
        2: 1.5,
        3: 2,
        4: 4,
        5: 8
    };

    const FISH_AREA_GROUPS = {
        river: ["거목강", "고요한강", "노을강", "얕은강", "모든강"],
        lake: ["근교호수", "숲속호수", "온천산호수", "초원호수", "모든호수"],
        sea: ["고래바다", "구해", "동해", "잔잔한바다", "바다낚시"]
    };

    function normalizeHabitatName(value) {
        return String(value || '').replace(/\s+/g, '').trim();
    }

    function getFishAreaKeysByHabitat(habitat) {
        const normalized = normalizeHabitatName(habitat);
        return Object.entries(FISH_AREA_GROUPS)
            .filter(([, habitats]) => habitats.some(item => normalizeHabitatName(item) === normalized))
            .map(([key]) => key);
    }

    function handleFishAreaAll(checkbox) {
        if (checkbox.checked) {
            document.querySelectorAll('.fish-area-checkbox').forEach(cb => cb.checked = false);
        }
        applyFilters();
    }

    function handleFishAreaOption() {
        const selected = document.querySelectorAll('.fish-area-checkbox:checked');
        const allCheckbox = document.getElementById('fishAreaAll');
        if (allCheckbox) allCheckbox.checked = selected.length === 0;
        applyFilters();
    }


    async function loadFishData() {
        try {
            // 여러 경로 시도
            let response = await fetch('../../data/fish_data.json');

            // 첫 번째 시도 실패 시 다른 경로 시도
            if (!response.ok) {
                response = await fetch('./fish_data.json');
            }

            if (!response.ok) {
                throw new Error('fish_data.json 파일을 찾을 수 없습니다.');
            }

            fishData = await response.json();
            
            console.log('물고기 데이터 로드 성공:', fishData.length + '종');
            displayStats();
            displayAllFish();
        } catch (error) {
            console.error('데이터 로드 에러:', error);
            document.getElementById('content').innerHTML =
                `<div class="error">❌ 데이터 파일을 불러올 수 없습니다.</div>`;
        }
    }

    // 매개변수를 제대로 받고 중복 확인
    async function loadSeasonData(filename) {
        // 이미 로드한 시즌이면 중복 로드 방지
        if (loadedSeasons.has(filename)) {
            alert('이미 추가된 시즌입니다.');
            return;
        }

        try {
            // filename 에 서브폴더 경로 포함 (예: season_ice/season_ice_fish.json)
            // loadSeasonData() 호출 시 항상 ../../data/ 기준 상대경로로 전달할 것
            let response = await fetch(`../../data/${filename}`);

            if (!response.ok) {
                throw new Error(`${filename} 파일을 찾을 수 없습니다.`);
            }

            const seasonData = await response.json();

            // 이름 기준 중복 제거하며 병합
            const combined = [...fishData, ...seasonData];
            fishData = combined.filter((fish, index, self) =>
                index === self.findIndex((f) => f.name === fish.name)
            );

            // 로드한 시즌 기록
            loadedSeasons.add(filename);

            alert(`${seasonData.length}종의 시즌 데이터가 병합되었습니다.\n(총 ${fishData.length}종)`);
            displayStats();
            displayAllFish();
        } catch (error) {
            console.error('시즌 데이터 로드 에러:', error);
            alert(`시즌 데이터를 불러오지 못했습니다.\n${error.message}`);
        }
    }

    // 시즌 데이터 제거 함수
    async function removeSeasonData() {
        if (loadedSeasons.size === 0) {
            alert('제거할 시즌 데이터가 없습니다.');
            return;
        }

        // 원본 데이터를 다시 로드
        try {
            let response = await fetch('../../data/fish_data.json');
            if (!response.ok) {
                response = await fetch('./fish_data.json');
            }

            if (!response.ok) {
                throw new Error('fish_data.json 파일을 찾을 수 없습니다.');
            }

            fishData = await response.json();
            
            loadedSeasons.clear(); // 시즌 기록 초기화

            alert('모든 시즌 데이터가 제거되었습니다.\n기본 데이터만 표시됩니다.');
            displayStats();
            displayAllFish();
        } catch (error) {
            console.error('데이터 초기화 에러:', error);
            alert('데이터를 초기화하지 못했습니다.');
        }
    }


    function getSelectedFilters() {
        const timeCheckboxes = document.querySelectorAll('#timeFilterGroup input[type="checkbox"]:checked');
        const weatherCheckboxes = document.querySelectorAll('#weatherFilterGroup input[type="checkbox"]:checked');
        const areaCheckboxes = document.querySelectorAll('.fish-area-checkbox:checked');
        const rainbowOnly = document.getElementById('rainbowOnly')?.checked || false;
        const sunnyOnly = document.getElementById('sunnyOnly')?.checked || false;
        const rainyOnly = document.getElementById('rainyOnly')?.checked || false;
        const searchText = document.getElementById('fishSearch')?.value.trim().toLowerCase() || '';

        return {
            times: Array.from(timeCheckboxes).map(cb => cb.value),
            weathers: Array.from(weatherCheckboxes).map(cb => cb.value),
            areas: Array.from(areaCheckboxes).map(cb => cb.value),
            rainbowOnly: rainbowOnly,
            sunnyOnly: sunnyOnly,
            rainyOnly: rainyOnly,
            searchText: searchText
        };
    }

    function applyFilters() {
        displayAllFish();
    }

    function selectAllTime() {
        const checkboxes = document.querySelectorAll('#timeFilterGroup input[type="checkbox"]');
        checkboxes.forEach(cb => cb.checked = true);
        applyFilters();
    }

    function selectAllWeather() {
        const checkboxes = document.querySelectorAll('#weatherFilterGroup input[type="checkbox"]');
        checkboxes.forEach(cb => {
            if (!cb.id.includes('Only')) { // Only 들어간 것만 빼고
                cb.checked = true;
            }
        });
        applyFilters();
    }

    function resetFilters() {
        const allCheckboxes = document.querySelectorAll('input[type="checkbox"]');
        allCheckboxes.forEach(cb => cb.checked = false);
        const areaAll = document.getElementById('fishAreaAll');
        if (areaAll) areaAll.checked = true;
        document.getElementById('fishSearch').value = '';
        applyFilters();
    }

    function displayStats() {
        const totalFish = fishData.length;
        const habitats = [...new Set(fishData.map(f => f.habitat))].length;
        const knownPrices = fishData.map(f => Number(f.price)).filter(price => Number.isFinite(price) && price > 0);
        const maxPrice = knownPrices.length ? Math.max(...knownPrices) : 0;
        const statsHTML = `
            <div class="stat-card">
                <div class="number">${totalFish}</div>
                <div class="label">총 물고기 종류</div>
            </div>
            <div class="stat-card">
                <div class="number">${habitats}</div>
                <div class="label">서식지 종류</div>
            </div>
            <div class="stat-card">
                <div class="number">₩${maxPrice}</div>
                <div class="label">최고 판매가</div>
            </div>
            <!-- 수집 완료 현황 카드 -->
            <div class="stat-card">
                <div class="number">${collectedFish.size} / ${totalFish}</div>
                <div class="label">수집 완료</div>
            </div>
        `;
        document.getElementById('stats').innerHTML = statsHTML;
    }

    function sortFish(fishes, column, order) {
        return [...fishes].sort((a, b) => {
            let valueA, valueB;

            if (column === 'name' || column === 'habitat') {
                valueA = column === 'name' ? getLocalizedName(a) : a.habitat;
                valueB = column === 'name' ? getLocalizedName(b) : b.habitat;
                return order === 'asc' ? valueA.localeCompare(valueB, 'ko') : valueB.localeCompare(valueA, 'ko');
            } else if (column === 'level') {
                valueA = a.level;
                valueB = b.level;
            } else if (column === 'price') {
                valueA = Number.isFinite(Number(a.price)) && Number(a.price) > 0 ? Number(a.price) : Number.POSITIVE_INFINITY;
                valueB = Number.isFinite(Number(b.price)) && Number(b.price) > 0 ? Number(b.price) : Number.POSITIVE_INFINITY;
            }

            if (valueA === Number.POSITIVE_INFINITY && valueB === Number.POSITIVE_INFINITY) return 0;
            if (valueA === Number.POSITIVE_INFINITY) return 1;
            if (valueB === Number.POSITIVE_INFINITY) return -1;
            return order === 'asc' ? valueA - valueB : valueB - valueA;
        });
    }

    function handleSort(column) {
        if (currentSort.column === column) {
            currentSort.order = currentSort.order === 'asc' ? 'desc' : 'asc';
        } else {
            currentSort.column = column;
            currentSort.order = 'asc';
        }
        displayAllFish();
    }

    function updatePrice(fishName, basePrice, selectElement) {
        const priceSpan = selectElement.parentElement.querySelector('.price');
        const numericBasePrice = Number(basePrice);
        if (!Number.isFinite(numericBasePrice) || numericBasePrice <= 0) {
            priceSpan.textContent = '정보 없음';
            return;
        }
        const star = parseInt(selectElement.value);
        const multiplier = starMultipliers[star];
        const calculatedPrice = Math.floor(numericBasePrice * multiplier);

        priceSpan.textContent = `₩${calculatedPrice}`;
    }

    function displayAllFish() {
        const filters = getSelectedFilters();

        // 필터 적용
        let filteredFish = fishData;

        // 이름 검색 필터
        if (filters.searchText) {
            filteredFish = filteredFish.filter(fish => {
                return (fish.name + " " + (fish.nameJa || "")).toLowerCase().includes(filters.searchText);
            });
        }

        // 수집 완료 숨기기 필터: hideCollected가 true이면 수집된 항목 제외
        if (hideCollected) {
            filteredFish = filteredFish.filter(fish => !collectedFish.has(fish.name));
        }

        // 장소 고정 필터
        // 강/호수/바다 버튼은 세부 서식지(habitat) 기준으로 묶어서 표시한다.
        if (filters.areas.length > 0) {
            filteredFish = filteredFish.filter(fish => {
                const areaKeys = getFishAreaKeysByHabitat(fish.habitat);
                return filters.areas.some(area => areaKeys.includes(area));
            });
        }

        // 시간 필터
        // 체크한 시간 중 하나라도 포함되면 표시한다.
        // 예: 아침을 체크하면 아침이 포함된 모든 항목이 나오며,
        // 하루 종일(새벽·아침·낮·저녁) 항목도 함께 표시된다.
        if (filters.times.length > 0) {
            filteredFish = filteredFish.filter(fish => {
                if (!fish.time || fish.time.length === 0) return false;
                return filters.times.some(time => fish.time.includes(time));
            });
        }

        // 날씨 필터 로직
        // 전용 날씨: 해당 날씨 한 가지에만 등장하는 항목만 표시한다.
        // 포함할 날씨: 체크한 날씨 조합과 정확히 같은 항목만 표시한다.
        const exclusiveWeather = filters.rainbowOnly ? "무지개"
            : filters.sunnyOnly ? "맑음"
            : filters.rainyOnly ? "비"
            : null;

        if (exclusiveWeather) {
            filteredFish = filteredFish.filter(fish => {
                if (!fish.weather || fish.weather.length === 0) return false;
                return fish.weather.length === 1 && fish.weather[0] === exclusiveWeather;
            });
        } else if (filters.weathers.length > 0) {
            filteredFish = filteredFish.filter(fish => {
                if (!fish.weather || fish.weather.length === 0) return false;
                return filters.weathers.every(weather => fish.weather.includes(weather));
            });
        }

        const sortedFish = sortFish(filteredFish, currentSort.column, currentSort.order);

        let html = `
            <div class="habitat-group">
                <div class="habitat-header">
                    <span>전체 물고기 목록</span>
                    <span class="count-badge">${sortedFish.length}종</span>
                </div>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <!-- 수집 체크 컬럼 -->
                                <th class="col-collect">수집</th>
                                <!-- 물고기 이미지 컬럼 -->
                                <th class="col-fish-img">이미지</th>
                                <th class="sortable ${currentSort.column === 'name' ? 'sort-' + currentSort.order : ''}"
                                    onclick="handleSort('name')">이름</th>
                                <th class="sortable col-habitat-fish ${currentSort.column === 'habitat' ? 'sort-' + currentSort.order : ''}"
                                    onclick="handleSort('habitat')">서식지</th>
                                <th class="col-size">크기</th>
                                <th class="sortable col-level ${currentSort.column === 'level' ? 'sort-' + currentSort.order : ''}"
                                    onclick="handleSort('level')">레벨</th>
                                <th class="sortable ${currentSort.column === 'price' ? 'sort-' + currentSort.order : ''}"
                                    onclick="handleSort('price')">판매가</th>
                                <th>출현 시간</th>
                                <th>날씨 조건</th>
                            </tr>
                        </thead>
                        <tbody>
        `;

        sortedFish.forEach(fish => {
            // --- 시간 표시 로직 ---
const allTimes = ['새벽', '아침', '낮', '저녁'];
const isAlwaysTime = fish.timeAll || (fish.time && allTimes.every(t => fish.time.includes(t)));
const timeDisplay = isAlwaysTime
    ? '<span class="time-badge always">하루 종일</span>'
    : [...fish.time]
        .sort((a, b) => allTimes.indexOf(a) - allTimes.indexOf(b))
        .map(t => `<span class="time-badge">${t}</span>`)
        .join(' ');

            // --- 날씨 표시 로직 ---
            const allWeathers = ['맑음', '비', '무지개'];
            const isAlwaysWeather = fish.weatherAll || (fish.weather && allWeathers.every(w => fish.weather.includes(w)));
            const weatherDisplay = isAlwaysWeather
                ? '<span class="weather-badge always">항상</span>'
                : fish.weather.map(w => `<span class="weather-badge">${w}</span>`).join(' ');

            // --- 이미지 표시 로직 ---
            // image 필드가 있으면 썸네일, 없으면 물고기 이모지 자리표시자
            const fishDisplayName = getLocalizedName(fish);
            const imgCell = fish.image
                ? `<img class="fish-thumb"
                        src="../../../public/images/fish_img/fish_${fish.image}.webp"
                        alt="${fishDisplayName}"
                        onerror="this.outerHTML='<div class=\\" fish-thumb-placeholder\\ "></div>`
                : `<div class="fish-thumb-placeholder">🐟</div>`;

            // 수집 완료 여부에 따라 행에 collected-row 클래스 부여 (흐리게 + 취소선 처리)
            const isCollected = collectedFish.has(fish.name);
            const hasKnownPrice = Number.isFinite(Number(fish.price)) && Number(fish.price) > 0;
            const priceValueForJs = hasKnownPrice ? Number(fish.price) : 0;
            const priceText = hasKnownPrice ? `₩${Number(fish.price)}` : '정보 없음';

            html += `
            <tr class="${isCollected ? 'collected-row' : ''}">
                <!-- 수집 체크박스: 체크 시 localStorage에 저장 -->
                <td class="col-collect">
                    <input type="checkbox"
                           ${isCollected ? 'checked' : ''}
                           onchange="toggleCollected('${fish.name.replace(/'/g, "\\'")}')">
                </td>
                <td class="col-fish-img">${imgCell}</td>
                <td class="item-name">${getSpecialIcon(fish.special)}${fishDisplayName}</td>
                <td>${getHabitatIcon(fish.habitat)} ${fish.habitat}</td>
                <td>${getSizeIcon(fish.size)}${fish.size}</td>
                <td><span class="level-badge">Lv.${fish.level}</span></td>
                <td><div class="price-cell">
                                <span>⭐</span>
                                <select class="star-selector" onchange="updatePrice('${getLocalizedName(fish)}', ${priceValueForJs}, this)">
                                    <option value="1">1성</option>
                                    <option value="2">2성</option>
                                    <option value="3">3성</option>
                                    <option value="4">4성</option>
                                    <option value="5">5성</option>
                                </select>
                                <span class="price">${priceText}</span>
                            </div></td>
                <td>${timeDisplay}</td>
                <td>${weatherDisplay}</td>
            </tr>
        `;
        });

        html += `
                        </tbody>
                    </table>
                </div>
            </div>
        `;

        document.getElementById('content').innerHTML = html;
    }

    function getSpecialIcon(special) {
        // 새 시즌이 추가되면 여기에 키-이모지 쌍을 추가하면 됩니다
        const icons = {
            '빙설':     '❄️',
            '빙설 시즌': '❄️',  // 구버전 데이터 호환
            '꿈의 명암': '🌙',
            '블록 시가지': '🧱',
            '집어기':   '💎',
            '황금':     '✨',
        }
        return icons[special] || '';
    }

    function getHabitatIcon(habitat) {
        const icons = {
            '거목강': '🌊',
            '거목 강': '🌊',
            '고요한강': '🌊',
            '고요한 강': '🌊',
            '노을강': '🌊',
            '노을 강': '🌊',
            '얕은강': '🌊',
            '얕은 강': '🌊',
            '모든강': '🌊',
            '모든 강': '🌊',
            '근교호수': '🏞️',
            '근교 호수': '🏞️',
            '숲속호수': '🏞️',
            '숲속 호수': '🏞️',
            '온천산호수': '🏞️',
            '온천산 호수': '🏞️',
            '초원호수': '🏞️',
            '초원 호수': '🏞️',
            '모든호수': '🏞️',
            '모든 호수': '🏞️',
            '고래바다': '⚓',
            '고래 바다': '⚓',
            '구해': '⚓',
            '동해': '⚓',
            '잔잔한바다': '⚓',
            '잔잔한 바다': '⚓',
            '바다낚시': '⚓',
            '얼음 결정 물고기 사건': '❄️',
        };
        return icons[habitat] || '';
    }

    function getSizeIcon(size) {
        const icons = {
            '푸른색': '🐟',
            '황금': '✨',
        }
        return icons[size] || '';
    }

    window.onload = loadFishData;
</script>
</body>
</html>
