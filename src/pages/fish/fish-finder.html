<!DOCTYPE html>
<html lang="ko">
<head>
    <script>
        // Google Analytics 4 초기화
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-RXTDCP8G1V');
    </script>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>물고기 찾기 - 두근두근타운</title>
    <link href="../../css/common.css" rel="stylesheet">

    <!-- 방문자 추적 스크립트 (로컬 localStorage 기록용) -->
    <script src="../../../src/js/tracker.js"></script>
</head>
<body>
<div id="header-placeholder"></div>

<main>
    <div class="datetime-section">
        <nav>
            <ul>
                <li><a href="fish-list.html">어류 도감</a></li>
            </ul>
        </nav>
        <h1>🔍 물고기 찾기</h1>
        <p>현재 조건에서 잡을 수 있는 물고기를 찾아보세요</p>

        <div class="datetime-display">
            <div class="date-info">
                <div class="current-date" id="currentDate"></div>
                <div class="current-time" id="currentTime"></div>
            </div>
        </div>
        <div class="time-bar">
            <div class="time-segment morning">
                <div class="segment-label">🌅 아침</div>
                <div class="segment-time">06:00 - 12:00</div>
            </div>
            <div class="time-segment afternoon">
                <div class="segment-label">☀️ 낮</div>
                <div class="segment-time">12:00 - 18:00</div>
            </div>
            <div class="time-segment evening">
                <div class="segment-label">🌆 저녁</div>
                <div class="segment-time">18:00 - 00:00</div>
            </div>
            <div class="time-segment night">
                <div class="segment-label">🌙 새벽</div>
                <div class="segment-time">00:00 - 06:00</div>
            </div></div>
        </div>
    </div>

    <div class="input-section">
        <div class="input-group">
            <div class="input-item">
                <label for="fishName">🐟 물고기 이름</label>
                <input id="fishName" oninput="filterFish()" placeholder="예: 연어, 배스, 붕어..." type="text">
            </div>

            <div class="input-item">
                <label for="level">🎣 취미 레벨</label>
                <input id="level" max="14" min="1" type="number" value="14">
            </div>

            <div class="input-item">
                <label for="time">🕐 시간대</label>
                <select id="time">
                    <option value="아침">아침</option>
                    <option value="낮">낮</option>
                    <option value="저녁">저녁</option>
                    <option value="새벽">새벽</option>
                </select>
            </div>

            <div class="input-item">
                <label for="weather">🌤️ 날씨</label>
                <select id="weather">
                    <option selected value="맑음">맑음</option>
                    <option value="비">비</option>
                    <option value="무지개">무지개</option>
                </select>
            </div>
        </div>

        <!-- 크기 필터 체크박스: 체크 시 해당 size의 물고기를 결과에서 숨김 -->
        <div class="size-filter-group" style="margin-top: 16px; display: flex; gap: 16px; flex-wrap: wrap; align-items: center;">
            <span style="font-weight: bold; font-size: 0.95em;">🚫 크기 제외 필터</span>
            <label class="size-filter-label" style="display: flex; align-items: center; gap: 6px; cursor: pointer;">
                <input
                    type="checkbox"
                    id="excludeBlue"
                    onchange="filterFish()"
                >
                <!-- 푸른색 사이즈 물고기 숨기기 -->
                🐟 푸른색 숨기기
            </label>
            <label class="size-filter-label" style="display: flex; align-items: center; gap: 6px; cursor: pointer;">
                <input
                    type="checkbox"
                    id="excludeGolden"
                    onchange="filterFish()"
                >
                <!-- 황금 사이즈 물고기 숨기기 -->
                ✨ 황금 숨기기
            </label>
        </div>

        <!-- 시즌 추가/제거 버튼 — 새 시즌 추가 시 버튼과 loadSeasonData 경로만 추가 -->
        <div style="display: flex; gap: 8px; margin-top: 16px; flex-wrap: wrap; align-items: center;">
            <button onclick="filterFish()">🔍 물고기 찾기</button>
            <button class="filter-btn season-ice-btn"        id="btnIceAdd"        onclick="loadSeasonData('season_ice/season_ice_fish.json', 'ice')">❄️ 빙설 추가</button>
            <button class="filter-btn season-dreamlight-btn" id="btnDreamlightAdd" onclick="loadSeasonData('season_dreamlight/season_dreamlight_fish.json', 'dreamlight')">🌙 꿈의 명암 추가</button>
            <button class="filter-btn season-blocktown-btn" id="btnBlocktownAdd"    onclick="loadSeasonData('season_blocktown/season_blocktown_fish.json', 'blocktown')">🧱 블록 시가지 추가</button>
            <button class="filter-btn-reset"                 id="btnSeasonRemove"  onclick="removeSeasonData()">🗑️ 시즌 제거</button>
        </div>
    </div>

    <div class="results" id="results"></div>
</main>

<div id="footer-placeholder"></div>

<script src="../../js/common.js"></script>
<script>
    let fishData = [];
    let currentSort = {column: 'price', order: 'desc'};
    let loadedSeasons = new Set();

    // 등급별 가격 배율
    const starMultipliers = {
        1: 1,
        2: 1.5,
        3: 2,
        4: 4,
        5: 8
    };

    function updateDateTime() {
        const now = new Date();
        const days = ['일요일', '월요일', '화요일', '수요일', '목요일', '금요일', '토요일'];
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const date = String(now.getDate()).padStart(2, '0');
        const dayName = days[now.getDay()];
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        const seconds = String(now.getSeconds()).padStart(2, '0');

        document.getElementById('currentDate').textContent =
            `${year}년 ${month}월 ${date}일 ${dayName}`;
        document.getElementById('currentTime').textContent =
            `${hours}:${minutes}:${seconds}`;

        // 현재 시간대 계산 및 활성화
        const hour = now.getHours();
        let currentPeriod = '';
        let position = 0;

        if (hour >= 6 && hour < 12) {
            currentPeriod = 'morning';
            position = ((hour - 6) * 60 + now.getMinutes()) / 360;
            position = position * 25 + 12.5;
        } else if (hour >= 12 && hour < 18) {
            currentPeriod = 'afternoon';
            position = ((hour - 12) * 60 + now.getMinutes()) / 360;
            position = position * 25 + 37.5;
        } else if (hour >= 18 && hour < 24) {
            currentPeriod = 'evening';
            position = ((hour - 18) * 60 + now.getMinutes()) / 360;
            position = position * 25 + 62.5;
        } else {
            currentPeriod = 'night';
            position = (hour * 60 + now.getMinutes()) / 360;
            position = position * 25 + 87.5;
        }

        document.querySelectorAll('.time-segment').forEach(seg => {
            seg.classList.remove('active');
        });

        const activeSegment = document.querySelector(`.time-segment.${currentPeriod}`);
        if (activeSegment) {
            activeSegment.classList.add('active');
        }
    }

    // 1초마다 업데이트
    setInterval(updateDateTime, 1000);
    updateDateTime();

    // 페이지 로드시 현재 시간에 맞춰 select 박스 설정
    function setInitialTimeOption() {
        const hour = new Date().getHours();
        const timeSelect = document.getElementById('time');

        if (hour >= 6 && hour < 12) {
            timeSelect.value = '아침';
        } else if (hour >= 12 && hour < 18) {
            timeSelect.value = '낮';
        } else if (hour >= 18 && hour < 24) {
            timeSelect.value = '저녁';
        } else {
            timeSelect.value = '새벽';
        }
    }

    async function loadFishData() {
        try {
            let response = await fetch('../../data/fish_data.json');

            if (!response.ok) {
                response = await fetch('./fish_data.json');
            }

            if (!response.ok) {
                throw new Error('fish_data.json 파일을 찾을 수 없습니다.');
            }

            fishData = await response.json();
            fishData = fishData.filter(f => f.level <= 14); // 인게임 해금 레벨 제한
            console.log('물고기 데이터 로드 성공:', fishData.length + '종');
            filterFish();
        } catch (error) {
            console.error('데이터 로드 에러:', error);
            document.getElementById('results').innerHTML =
                `<div class="error">❌ 데이터 파일을 불러올 수 없습니다.</div>`;
        }
    }

    /**
     * 시즌 데이터를 fishData 에 병합합니다.
     * @param {string} dataPath  - src/data/ 기준 상대 경로 (예: 'season_ice/season_ice_fish.json')
     * @param {string} seasonKey - loadedSeasons 추적에 사용할 고유 키 (예: 'ice', 'dreamlight')
     */
    async function loadSeasonData(dataPath, seasonKey) {
        // 동일 시즌 중복 로드 방지
        if (loadedSeasons.has(seasonKey)) {
            alert('이미 추가된 시즌입니다.');
            return;
        }

        try {
            const response = await fetch(`../../data/${dataPath}`);
            if (!response.ok) throw new Error(`${dataPath} 파일을 찾을 수 없습니다.`);

            const seasonData = await response.json();

            // 이름 기준 중복 제거하며 병합
            const combined = [...fishData, ...seasonData];
            fishData = combined.filter((fish, index, self) =>
                index === self.findIndex((f) => f.name === fish.name)
            );

            loadedSeasons.add(seasonKey);

            // 추가 버튼 비활성화
            const addBtn = document.getElementById(`btn${seasonKey.charAt(0).toUpperCase() + seasonKey.slice(1)}Add`);
            if (addBtn) addBtn.disabled = true;
            // 제거 버튼 활성화
            const removeBtn = document.getElementById('btnSeasonRemove');
            if (removeBtn) removeBtn.disabled = false;

            alert(`${seasonData.length}종의 시즌 데이터가 병합되었습니다.\n(총 ${fishData.length}종)`);
            filterFish();
        } catch (error) {
            console.error('시즌 데이터 로드 에러:', error);
            alert(`시즌 데이터를 불러오지 못했습니다.\n${error.message}`);
        }
    }

    async function removeSeasonData() {
        if (loadedSeasons.size === 0) {
            alert('제거할 시즌 데이터가 없습니다.');
            return;
        }

        try {
            let response = await fetch('../../data/fish_data.json');
            if (!response.ok) {
                response = await fetch('./fish_data.json');
            }

            if (!response.ok) {
                throw new Error('fish_data.json 파일을 찾을 수 없습니다.');
            }

            fishData = await response.json();
            fishData = fishData.filter(f => f.level <= 14); // 인게임 해금 레벨 제한
            loadedSeasons.clear();

            // 모든 추가 버튼을 다시 활성화
            ['btnIceAdd', 'btnDreamlightAdd', 'btnBlocktownAdd'].forEach(id => {
                const btn = document.getElementById(id);
                if (btn) btn.disabled = false;
            });

            alert('모든 시즌 데이터가 제거되었습니다.\n기본 데이터만 표시됩니다.');
            filterFish();
        } catch (error) {
            console.error('데이터 초기화 에러:', error);
            alert('데이터를 초기화하지 못했습니다.');
        }
    }

    function filterFish() {
        if (fishData.length === 0) {
            document.getElementById('results').innerHTML = '<div class="loading">⏳ 데이터를 불러오는 중...</div>';
            return;
        }

        const fishName = document.getElementById('fishName').value.trim().toLowerCase();
        const level = parseInt(document.getElementById('level').value);
        const time = document.getElementById('time').value;
        const weather = document.getElementById('weather').value;

        // 체크박스 상태 읽기: 체크되면 해당 size의 물고기를 결과에서 제외
        const excludeBlue   = document.getElementById('excludeBlue').checked;   // '푸른색' 제외 여부
        const excludeGolden = document.getElementById('excludeGolden').checked; // '황금' 제외 여부

        const filtered = fishData.filter(fish => {
            if (fishName && !(fish.name + " " + (fish.nameJa || "")).toLowerCase().includes(fishName)) return false;
            if (fish.level > level) return false;

            // 푸른색 체크박스가 체크된 경우 size가 '푸른색'인 물고기 제외
            if (excludeBlue && fish.size === '푸른색') return false;

            // 황금 체크박스가 체크된 경우 size가 '황금'인 물고기 제외
            if (excludeGolden && fish.size === '황금') return false;

            const timeOk = fish.time && fish.time.includes(time);
            const weatherOk = fish.weather && fish.weather.includes(weather);
            return timeOk && weatherOk;
        });

        displayResults(filtered);
    }

    function sortFish(fishes, column, order) {
        return [...fishes].sort((a, b) => {
            let valueA, valueB;
            if (column === 'name' || column === 'habitat') {
                valueA = column === 'name' ? a.name : a.habitat;
                valueB = column === 'name' ? b.name : b.habitat;
                return order === 'asc' ? valueA.localeCompare(valueB, 'ko') : valueB.localeCompare(valueA, 'ko');
            } else if (column === 'level') {
                valueA = a.level;
                valueB = b.level;
            } else if (column === 'price') {
                valueA = a.price;
                valueB = b.price;
            }
            return order === 'asc' ? valueA - valueB : valueB - valueA;
        });
    }

    function handleSort(column) {
        if (currentSort.column === column) {
            currentSort.order = currentSort.order === 'asc' ? 'desc' : 'asc';
        } else {
            currentSort.column = column;
            currentSort.order = 'asc';
        }
        filterFish();
    }

    function updatePrice(fishName, basePrice, selectElement) {
        const priceSpan = selectElement.parentElement.querySelector('.price');
        const numericBasePrice = Number(basePrice);
        if (!Number.isFinite(numericBasePrice) || numericBasePrice <= 0) {
            priceSpan.textContent = '정보 없음';
            return;
        }
        const star = parseInt(selectElement.value);
        const multiplier = starMultipliers[star];
        const calculatedPrice = Math.floor(numericBasePrice * multiplier);

        priceSpan.textContent = `₩${calculatedPrice}`;
    }

    function getSpecialIcon(special) {
        const icons = {
            '빙설 시즌': '❄️',
            '집어기': '💎',
            '황금': '✨',
        }
        return icons[special] || '';
    }

    function getHabitatIcon(habitat) {
        const icons = {
            '모든 강': '🌊',
            '모든 호수': '🏞️',
            '모든 바다': '🌅',
            '바다낚시': '⚓',
            '얼음 결정 물고기 사건': '❄️',
        };
        return icons[habitat] || '';
    }

    function getSizeIcon(size) {
        const icons = {
            '푸른색': '🐟',
            '황금': '✨',
        }
        return icons[size] || '';
    }

    function displayResults(fishes) {
        const resultsDiv = document.getElementById('results');

        if (fishes.length === 0) {
            resultsDiv.innerHTML = '<div class="no-results">⚠️ 현재 조건에서 잡을 수 있는 물고기가 없어요!</div>';
            return;
        }

        const sortedFishes = sortFish(fishes, currentSort.column, currentSort.order);

        let html = `
                <div class="habitat-group">
                    <div class="habitat-header">
                        <span>검색 결과</span>
                        <span class="count-badge">${sortedFishes.length} 종</span>
                    </div>
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <!-- 물고기 이미지 컬럼 -->
                                    <th class="col-fish-img">이미지</th>
                                    <th class="sortable ${currentSort.column === 'name' ? 'sort-' + currentSort.order : ''}" onclick="handleSort('name')">이름</th>
                                    <th class="sortable col-habitat-fish ${currentSort.column === 'habitat' ? 'sort-' + currentSort.order : ''}" onclick="handleSort('habitat')">서식지</th>
                                    <th class="col-size">크기</th>
                                    <th class="sortable col-level ${currentSort.column === 'level' ? 'sort-' + currentSort.order : ''}" onclick="handleSort('level')">레벨</th>
                                    <th class="sortable ${currentSort.column === 'price' ? 'sort-' + currentSort.order : ''}" onclick="handleSort('price')">판매가 (등급별)</th>
                                    <th>출현 시간</th>
                                    <th>날씨 조건</th>
                                </tr>
                            </thead>
                            <tbody>`;

        sortedFishes.forEach(fish => {
            // --- 시간 표시 로직 ---
            const allTimes = ['아침', '낮', '저녁', '새벽'];
            const isAlwaysTime = fish.timeAll || (fish.time && allTimes.every(t => fish.time.includes(t)));
            const timeDisplay = isAlwaysTime
                ? '<span class="time-badge always">하루 종일</span>'
                : fish.time.map(t => `<span class="time-badge">${t}</span>`).join(' ');

            // --- 날씨 표시 로직 ---
            const allWeathers = ['맑음', '비', '무지개'];
            const isAlwaysWeather = fish.weatherAll || (fish.weather && allWeathers.every(w => fish.weather.includes(w)));
            const weatherDisplay = isAlwaysWeather
                ? '<span class="weather-badge always">항상</span>'
                : fish.weather.map(w => `<span class="weather-badge">${w}</span>`).join(' ');

            const sizeDisplay = fish.size || '-';

            // --- 이미지 표시 로직 ---
            // image 필드가 있으면 썸네일, 없으면 물고기 이모지 자리표시자
            const imgCell = fish.image
                ? `<img class="fish-thumb"
                        src="../../../public/images/fish_img/fish_${fish.image}.webp"
                        alt="${getLocalizedName(fish)}"
                        onerror="this.outerHTML='<div class=\\"fish-thumb-placeholder\\"></div>`
                : `<div class="fish-thumb-placeholder">🐟</div>`;

            html += `
                    <tr>
                        <td class="col-fish-img">${imgCell}</td>
                        <td class="item-name">${getSpecialIcon(fish.special)}${getLocalizedName(fish)}</td>
                        <td>${getHabitatIcon(fish.habitat)}${fish.habitat}</td>
                        <td>${getSizeIcon(fish.size)}${sizeDisplay}</td>
                        <td><span class="level-badge">Lv.${fish.level}</span></td>
                        <td>
                            <div class="price-cell">
                                <span>⭐</span>
                                <select class="star-selector" onchange="updatePrice('${getLocalizedName(fish)}', ${priceValueForJs}, this)">
                                    <option value="1">1성</option>
                                    <option value="2">2성</option>
                                    <option value="3">3성</option>
                                    <option value="4">4성</option>
                                    <option value="5">5성</option>
                                </select>
                                <span class="price">${priceText}</span>
                            </div>
                        </td>
                        <td>${timeDisplay}</td>
                        <td>${weatherDisplay}</td>
                    </tr>`;
        });

        html += `</tbody></table></div></div>`;
        resultsDiv.innerHTML = html;
    }

    // 시간 선택을 먼저 하고 데이터를 로드하도록 변경
    window.onload = async function () {
        setInitialTimeOption();
        await loadFishData();
    };
</script>
</body>
</html>
