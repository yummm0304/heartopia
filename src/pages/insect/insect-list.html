<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>곤충 도감 - 두근두근타운</title>
    <link href="../../css/common.css" rel="stylesheet">

    <!-- 방문자 추적 스크립트 (로컬 localStorage 기록용) -->
    <script src="../../../src/js/tracker.js"></script>
</head>
<body>
<div id="header-placeholder"></div>

<main>
    <div class="page-header">
        <nav>
            <ul>
                <li><a href="insect-finder.html">곤충 찾기</a></li>
            </ul>
        </nav>
        <h1>🦋 곤충 도감</h1>
        <p>두근두근타운의 모든 곤충 정보를 확인하세요</p>
    </div>

    <div class="stats" id="stats">
        <div class="stat-card">
            <div class="number">-</div>
            <div class="label">총 곤충 종류</div>
        </div>
        <div class="stat-card">
            <div class="number">-</div>
            <div class="label">서식지 종류</div>
        </div>
        <div class="stat-card">
            <div class="number">-</div>
            <div class="label">최고 판매가</div>
        </div>
    </div>

    <div class="filter-section">
        <h2>🔍 필터</h2>

        <div class="search-box">
            <label for="insectSearch">🦋 곤충 이름 검색</label>
            <input id="insectSearch" oninput="applyFilters()" placeholder="예: 나비, 메뚜기, 사마귀..." type="text">
        </div>

        <div class="filter-groups">
            <div class="filter-group">
                <h3>⏰ 출현 시간</h3>
                <div class="checkbox-group">
                    <label class="checkbox-label">
                        <input onchange="applyFilters()" type="checkbox" value="아침"> 🌅 아침
                    </label>
                    <label class="checkbox-label">
                        <input onchange="applyFilters()" type="checkbox" value="낮"> ☀️ 낮
                    </label>
                    <label class="checkbox-label">
                        <input onchange="applyFilters()" type="checkbox" value="저녁"> 🌇 저녁
                    </label>
                    <label class="checkbox-label">
                        <input onchange="applyFilters()" type="checkbox" value="새벽"> 🌙 새벽
                    </label>
                </div>
            </div>

            <div class="filter-group">
                <h3>🌤️ 포함할 날씨</h3>
                <div class="checkbox-group">
                    <label class="checkbox-label">
                        <input onchange="applyFilters()" type="checkbox" value="맑음"> ☀️ 맑음
                    </label>
                    <label class="checkbox-label">
                        <input onchange="applyFilters()" type="checkbox" value="비"> 🌧️ 비
                    </label>
                    <label class="checkbox-label">
                        <input onchange="applyFilters()" type="checkbox" value="무지개"> 🌈 무지개
                    </label>
                </div>
            </div>

            <div class="filter-group">
                <h3>🔒 전용 날씨</h3>
                <div class="checkbox-group">
                    <label class="checkbox-label">
                        <input id="sunnyOnly" onchange="applyFilters()" type="checkbox"> ☀️ 맑음에만 등장
                    </label>
                    <label class="checkbox-label">
                        <input id="rainyOnly" onchange="applyFilters()" type="checkbox"> 🌧️ 비에만 등장
                    </label>
                    <label class="checkbox-label">
                        <input id="rainbowOnly" onchange="applyFilters()" type="checkbox"> 🌈 무지개에만 등장
                    </label>
                </div>
            </div>

            <div class="filter-actions">
                <!-- 빙설 시즌: season_ice/season_ice_insect.json 을 현재 목록에 병합 -->
                <button class="filter-btn season-ice-btn" onclick="loadSeasonData('season_ice/season_ice_insect.json')">❄️ 빙설 시즌 추가</button>
                <!-- 꿈의 명암 시즌: season_dreamlight/season_dreamlight_insect.json 을 현재 목록에 병합 -->
                <button class="filter-btn season-dreamlight-btn" onclick="loadSeasonData('season_dreamlight/season_dreamlight_insect.json')">🌙 꿈의 명암 추가</button>
                <!-- 블록 시가지 시즌 -->
                <button class="filter-btn season-blocktown-btn" onclick="loadSeasonData('season_blocktown/season_blocktown_insect.json')">🧱 블록 시가지 추가</button>
                <!-- 로드된 모든 시즌 데이터를 제거하고 기본 데이터로 복원 -->
                <button class="filter-btn-reset" onclick="removeSeasonData()">🗑️ 시즌 데이터 제거</button>
                <button class="filter-btn" onclick="selectAllTime()">시간 전체선택</button>
                <button class="filter-btn" onclick="selectAllWeather()">날씨 전체선택</button>
                <button class="filter-btn-reset" onclick="resetFilters()">필터 초기화</button>
                <!-- 수집 완료 항목 숨기기/보이기 토글 버튼 -->
                <button class="filter-btn" id="hideCollectedBtn" onclick="toggleHideCollected()">수집 완료 숨기기</button>
                <!-- 수집 체크 전체 초기화 버튼 -->
                <button class="filter-btn-reset" onclick="resetCollected()">🗑️ 수집 초기화</button>
            </div>
        </div>
    </div>

    <div class="habitat-section" id="content">
        <div class="loading">🦋 곤충 정보를 불러오는 중...</div>
    </div>
</main>

<div id="footer-placeholder"></div>

<script src="../../js/common.js"></script>

<script>
    let insectData = [];

    // ============================================================
    // 도감 수집 체크 관련
    // ============================================================
    const INSECT_COLLECTED_KEY = 'collected_insect';
    let collectedInsect = new Set(JSON.parse(localStorage.getItem(INSECT_COLLECTED_KEY) || '[]'));
    let hideCollected = false;

    function toggleCollected(name) {
        if (collectedInsect.has(name)) {
            collectedInsect.delete(name);
        } else {
            collectedInsect.add(name);
        }
        localStorage.setItem(INSECT_COLLECTED_KEY, JSON.stringify([...collectedInsect]));
        displayAllinsects();
    }

    function toggleHideCollected() {
        hideCollected = !hideCollected;
        const btn = document.getElementById('hideCollectedBtn');
        btn.textContent = hideCollected ? '수집 완료 보이기' : '수집 완료 숨기기';
        displayAllinsects();
    }

    function resetCollected() {
        if (!confirm('수집 체크를 모두 초기화할까요?')) return;
        collectedInsect.clear();
        localStorage.removeItem(INSECT_COLLECTED_KEY);
        displayAllinsects();
    }
    let currentSort = {column: 'price', order: 'desc'};
    let loadedSeasons = new Set();

    // 등급별 가격 배율
    const starMultipliers = {
        1: 1,
        2: 1.5,
        3: 2,
        4: 4,
        5: 8
    };

    async function loadinsectData() {
        try {
            let response = await fetch('../../data/insect_data.json');

            if (!response.ok) {
                response = await fetch('./insect_data.json');
            }

            if (!response.ok) {
                throw new Error('insect_data.json 파일을 찾을 수 없습니다.');
            }

            insectData = await response.json();
            console.log('곤충 데이터 로드 성공:', insectData.length + '종');
            displayStats();
            displayAllinsects();
        } catch (error) {
            console.error('데이터 로드 에러:', error);
            document.getElementById('content').innerHTML =
                `<div class="error">❌ 데이터 파일을 불러올 수 없습니다.</div>`;
        }
    }

    async function loadSeasonData(filename) {
        if (loadedSeasons.has(filename)) {
            alert('이미 추가된 시즌입니다.');
            return;
        }

        try {
            // filename 에 서브폴더 경로 포함 (예: season_ice/season_ice_insect.json)
            let response = await fetch(`../../data/${filename}`);

            if (!response.ok) {
                throw new Error(`${filename} 파일을 찾을 수 없습니다.`);
            }

            const seasonData = await response.json();

            // 이름 기준 중복 제거하며 병합
            const combined = [...insectData, ...seasonData];
            insectData = combined.filter((insect, index, self) =>
                index === self.findIndex((b) => b.name === insect.name)
            );

            loadedSeasons.add(filename);

            alert(`${seasonData.length}종의 시즌 데이터가 병합되었습니다.\n(총 ${insectData.length}종)`);
            displayStats();
            displayAllinsects();
        } catch (error) {
            console.error('시즌 데이터 로드 에러:', error);
            alert(`시즌 데이터를 불러오지 못했습니다.\n${error.message}`);
        }
    }

    async function removeSeasonData() {
        if (loadedSeasons.size === 0) {
            alert('제거할 시즌 데이터가 없습니다.');
            return;
        }

        try {
            let response = await fetch('../../data/insect_data.json');
            if (!response.ok) {
                response = await fetch('./insect_data.json');
            }

            if (!response.ok) {
                throw new Error('insect_data.json 파일을 찾을 수 없습니다.');
            }

            insectData = await response.json();
            loadedSeasons.clear();

            alert('모든 시즌 데이터가 제거되었습니다.\n기본 데이터만 표시됩니다.');
            displayStats();
            displayAllinsects();
        } catch (error) {
            console.error('데이터 초기화 에러:', error);
            alert('데이터를 초기화하지 못했습니다.');
        }
    }

    function getSelectedFilters() {
        const timeCheckboxes = document.querySelectorAll('.filter-group:nth-child(1) input[type="checkbox"]:checked');
        const weatherCheckboxes = document.querySelectorAll('.filter-group:nth-child(2) input[type="checkbox"]:checked:not(#rainbowOnly):not(#sunnyOnly):not(#rainyOnly)');
        const rainbowOnly = document.getElementById('rainbowOnly')?.checked || false;
        const sunnyOnly = document.getElementById('sunnyOnly')?.checked || false;
        const rainyOnly = document.getElementById('rainyOnly')?.checked || false;
        const searchText = document.getElementById('insectSearch')?.value.trim().toLowerCase() || '';

        return {
            times: Array.from(timeCheckboxes).map(cb => cb.value),
            weathers: Array.from(weatherCheckboxes).map(cb => cb.value),
            rainbowOnly: rainbowOnly,
            sunnyOnly: sunnyOnly,
            rainyOnly: rainyOnly,
            searchText: searchText
        };
    }

    function applyFilters() {
        displayAllinsects();
    }

    function selectAllTime() {
        const checkboxes = document.querySelectorAll('.filter-group:nth-child(1) input[type="checkbox"]');
        checkboxes.forEach(cb => cb.checked = true);
        applyFilters();
    }

    function selectAllWeather() {
        const checkboxes = document.querySelectorAll('.filter-group:nth-child(2) input[type="checkbox"]');
        checkboxes.forEach(cb => {
            if (!cb.id.includes('Only')) {
                cb.checked = true;
            }
        });
        applyFilters();
    }

    function resetFilters() {
        const allCheckboxes = document.querySelectorAll('input[type="checkbox"]');
        allCheckboxes.forEach(cb => cb.checked = false);
        document.getElementById('insectSearch').value = '';
        applyFilters();
    }

    function displayStats() {
        const totalinsects = insectData.length;
        const habitats = [...new Set(insectData.map(b => b.habitat))].length;
        const maxPrice = Math.max(...insectData.map(b => b.price));

        const statsHTML = `
            <div class="stat-card">
                <div class="number">${totalinsects}</div>
                <div class="label">총 곤충 종류</div>
            </div>
            <div class="stat-card">
                <div class="number">${habitats}</div>
                <div class="label">서식지 종류</div>
            </div>
            <div class="stat-card">
                <div class="number">₩${maxPrice}</div>
                <div class="label">최고 판매가</div>
            </div>
            <div class="stat-card">
                <div class="number">${collectedInsect.size} / ${totalinsects}</div>
                <div class="label">수집 완료</div>
            </div>
        `;
        document.getElementById('stats').innerHTML = statsHTML;
    }

    function sortinsects(insects, column, order) {
        return [...insects].sort((a, b) => {
            let valueA, valueB;

            if (column === 'name' || column === 'habitat') {
                valueA = column === 'name' ? getLocalizedName(a) : a.habitat;
                valueB = column === 'name' ? getLocalizedName(b) : b.habitat;
                return order === 'asc' ? valueA.localeCompare(valueB, 'ko') : valueB.localeCompare(valueA, 'ko');
            } else if (column === 'level') {
                valueA = a.level;
                valueB = b.level;
            } else if (column === 'price') {
                valueA = a.price;
                valueB = b.price;
            }

            return order === 'asc' ? valueA - valueB : valueB - valueA;
        });
    }

    function handleSort(column) {
        if (currentSort.column === column) {
            currentSort.order = currentSort.order === 'asc' ? 'desc' : 'asc';
        } else {
            currentSort.column = column;
            currentSort.order = 'asc';
        }
        displayAllinsects();
    }

    function updatePrice(insectName, basePrice, selectElement) {
        const star = parseInt(selectElement.value);
        const multiplier = starMultipliers[star];
        const calculatedPrice = Math.floor(basePrice * multiplier);

        const priceSpan = selectElement.parentElement.querySelector('.price');
        priceSpan.textContent = `₩${calculatedPrice}`;
    }

    function displayAllinsects() {
        const filters = getSelectedFilters();
        let filteredinsects = insectData;

        // 이름 검색 필터
        if (filters.searchText) {
            filteredinsects = filteredinsects.filter(insect => {
                return (insect.name + " " + (insect.nameJa || "")).toLowerCase().includes(filters.searchText);
            });
        }

        // 수집 완료 숨기기 필터
        if (hideCollected) {
            filteredinsects = filteredinsects.filter(insect => !collectedInsect.has(insect.name));
        }

        // 시간 필터
        // 체크한 시간 중 하나라도 포함되면 표시한다.
        // 예: 아침을 체크하면 아침이 포함된 모든 항목이 나오며,
        // 하루 종일(새벽·아침·낮·저녁) 항목도 함께 표시된다.
        if (filters.times.length > 0) {
            filteredinsects = filteredinsects.filter(insect => {
                if (!insect.time || insect.time.length === 0) return false;
                return filters.times.some(time => insect.time.includes(time));
            });
        }

        // 날씨 필터 로직
        // 전용 날씨: 해당 날씨 한 가지에만 등장하는 항목만 표시한다.
        // 포함할 날씨: 체크한 날씨 조합과 정확히 같은 항목만 표시한다.
        const exclusiveWeather = filters.rainbowOnly ? "무지개"
            : filters.sunnyOnly ? "맑음"
            : filters.rainyOnly ? "비"
            : null;

        if (exclusiveWeather) {
            filteredinsects = filteredinsects.filter(insect => {
                if (!insect.weather || insect.weather.length === 0) return false;
                return insect.weather.length === 1 && insect.weather[0] === exclusiveWeather;
            });
        } else if (filters.weathers.length > 0) {
            filteredinsects = filteredinsects.filter(insect => {
                if (!insect.weather || insect.weather.length === 0) return false;
                return filters.weathers.every(weather => insect.weather.includes(weather));
            });
        }

        const sortedinsects = sortinsects(filteredinsects, currentSort.column, currentSort.order);

        let html = `
            <div class="habitat-group">
                <div class="habitat-header">
                    <span>전체 곤충 목록</span>
                    <span class="count-badge">${sortedinsects.length}종</span>
                </div>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <!-- 수집 체크 컬럼 -->
                                <th class="col-collect">수집</th>
                                <th class="col-fish-img">이미지</th>
                                <th class="sortable ${currentSort.column === 'name' ? 'sort-' + currentSort.order : ''}"
                                    onclick="handleSort('name')">이름</th>
                                <th class="sortable ${currentSort.column === 'habitat' ? 'sort-' + currentSort.order : ''}"
                                    onclick="handleSort('habitat')">서식지</th>
                                <th class="sortable ${currentSort.column === 'level' ? 'sort-' + currentSort.order : ''}"
                                    onclick="handleSort('level')">레벨</th>
                                <th class="sortable ${currentSort.column === 'price' ? 'sort-' + currentSort.order : ''}"
                                    onclick="handleSort('price')">판매가</th>
                                <th>출현 시간</th>
                                <th>날씨 조건</th>
                            </tr>
                        </thead>
                        <tbody>
        `;

        sortedinsects.forEach(insect => {
            // 시간 표시 로직
            const allTimes = ['아침', '낮', '저녁', '새벽'];
            const isAlwaysTime = insect.timeAll || (insect.time && allTimes.every(t => insect.time.includes(t)));
            const timeDisplay = isAlwaysTime
                ? '<span class="time-badge always">하루 종일</span>'
                : insect.time.map(t => `<span class="time-badge">${t}</span>`).join(' ');

            // 날씨 표시 로직
            const allWeathers = ['맑음', '비', '무지개'];
            const isAlwaysWeather = insect.weatherAll || (insect.weather && allWeathers.every(w => insect.weather.includes(w)));
            const weatherDisplay = isAlwaysWeather
                ? '<span class="weather-badge always">항상</span>'
                : insect.weather.map(w => `<span class="weather-badge">${w}</span>`).join(' ');

            // 수집 완료 여부
            const isCollected = collectedInsect.has(insect.name);

            html += `
            <tr class="${isCollected ? 'collected-row' : ''}">
                <td class="col-collect">
                    <input type="checkbox"
                           ${isCollected ? 'checked' : ''}
                           onchange="toggleCollected('${insect.name.replace(/'/g, "\\'")}')">
                </td>
                <td class="col-fish-img">${insect.image
                    ? `<img class="fish-thumb" src="../../../public/images/insect_img/insect${insect.image}.webp" alt="${getLocalizedName(insect)}" onerror="handleInsectImgError(this)">`
                    : `<div class="fish-thumb-placeholder insect-photo-missing" title="사진 없음">🐞<span>사진 없음</span></div>`}</td>
                <td class="item-name">${getSpecialIcon(insect.special)}${getLocalizedName(insect)}</td>
                <td class="col-habitat-bird">${getHabitatIcon(insect.habitat)} ${insect.habitat}</td>
                <td><span class="level-badge">Lv.${insect.level}</span></td>
                <td><div class="price-cell">
                                <span>⭐</span>
                                <select class="star-selector" onchange="updatePrice('${getLocalizedName(insect)}', ${insect.price}, this)">
                                    <option value="1">1성</option>
                                    <option value="2">2성</option>
                                    <option value="3">3성</option>
                                    <option value="4">4성</option>
                                    <option value="5">5성</option>
                                </select>
                                <span class="price">₩${insect.price}</span>
                            </div></td>
                <td>${timeDisplay}</td>
                <td>${weatherDisplay}</td>
            </tr>
        `;
        });

        html += `
                        </tbody>
                    </table>
                </div>
            </div>
        `;

        document.getElementById('content').innerHTML = html;
    }

    /* 곤충 이미지 로드 실패 시 자리 표시자로 교체 */
    function handleInsectImgError(img) {
        const placeholder = document.createElement('div');
        placeholder.className = 'fish-thumb-placeholder';
        placeholder.textContent = '🦋';
        img.parentNode.replaceChild(placeholder, img);
    }

    function getSpecialIcon(special) {
        // 새 시즌이 추가되면 여기에 키-이모지 쌍을 추가하면 됩니다
        const icons = {
            '빙설':      '❄️',
            '빙설 시즌': '❄️',  // 구버전 데이터 호환
            '꿈의 명암': '🌙',
            '블록 시가지': '🧱',
        }
        return icons[special] || '';
    }

    function getHabitatIcon(habitat) {
        const icons = {
            '곤충 유인 사건': '🎯',
            '곤충 유인기': '📡',
            '얼음 결정 나비 사건': '❄️',
        }
        return icons[habitat] || '';
    }

    window.onload = loadinsectData;
</script>
</body>
</html>
