<!DOCTYPE html>
<html lang="ko">
<head>
    <script>
        // Google Analytics 4 초기화
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-RXTDCP8G1V');
    </script>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>곤충 찾기 - 두근두근타운</title>
    <link href="../../css/common.css" rel="stylesheet">

    <!-- 방문자 추적 스크립트 (로컬 localStorage 기록용) -->
    <script src="../../../src/js/tracker.js"></script>
</head>
<body>
<div id="header-placeholder"></div>

<main>
    <div class="datetime-section">
        <nav>
            <ul>
                <li><a href="insect-list.html">곤충 도감</a></li>
            </ul>
        </nav>
        <h1>🔍 곤충 찾기</h1>
        <p>현재 조건에서 잡을 수 있는 곤충을 찾아보세요</p>

        <div class="datetime-display">
            <div class="date-info">
                <div class="current-date" id="currentDate"></div>
                <div class="current-time" id="currentTime"></div>
            </div>
        </div>
        <div class="time-bar">
            <div class="time-segment morning">
                <div class="segment-label">🌅 아침</div>
                <div class="segment-time">06:00 - 12:00</div>
            </div>
            <div class="time-segment afternoon">
                <div class="segment-label">☀️ 낮</div>
                <div class="segment-time">12:00 - 18:00</div>
            </div>
            <div class="time-segment evening">
                <div class="segment-label">🌆 저녁</div>
                <div class="segment-time">18:00 - 00:00</div>
            </div>
            <div class="time-segment night">
                <div class="segment-label">🌙 새벽</div>
                <div class="segment-time">00:00 - 06:00</div>
            </div></div>
        </div>
    </div>

    <div class="input-section">
        <div class="input-group">
            <div class="input-item">
                <label for="insectName">🦋 곤충 이름</label>
                <input id="insectName" oninput="filterinsect()" placeholder="예: 나비, 메뚜기, 사마귀..." type="text">
            </div>

            <div class="input-item">
                <label for="level">🕸️ 취미 레벨</label>
                <input id="level" max="10" min="1" type="number" value="10">
            </div>

            <div class="input-item">
                <label for="time">🕐 시간대</label>
                <select id="time">
                    <option value="아침">아침</option>
                    <option value="낮">낮</option>
                    <option value="저녁">저녁</option>
                    <option value="새벽">새벽</option>
                </select>
            </div>

            <div class="input-item">
                <label for="weather">🌤️ 날씨</label>
                <select id="weather">
                    <option selected value="맑음">맑음</option>
                    <option value="비">비</option>
                    <option value="무지개">무지개</option>
                </select>
            </div>
        </div>

        <!-- 시즌 추가/제거 버튼 — 새 시즌 추가 시 버튼과 loadSeasonData 경로만 추가 -->
        <div style="display: flex; gap: 8px; margin-top: 16px; flex-wrap: wrap; align-items: center;">
            <button onclick="filterinsect()">🔍 곤충 찾기</button>
            <button class="filter-btn season-ice-btn"        id="btnIceAdd"        onclick="loadSeasonData('season_ice/season_ice_insect.json', 'ice')">❄️ 빙설 추가</button>
            <button class="filter-btn season-dreamlight-btn" id="btnDreamlightAdd" onclick="loadSeasonData('season_dreamlight/season_dreamlight_insect.json', 'dreamlight')">🌙 꿈의 명암 추가</button>
            <button class="filter-btn season-blocktown-btn" id="btnBlocktownAdd"    onclick="loadSeasonData('season_blocktown/season_blocktown_insect.json', 'blocktown')">🧱 블록 시가지 추가</button>
            <button class="filter-btn-reset"                 id="btnSeasonRemove"  onclick="removeSeasonData()">🗑️ 시즌 제거</button>
        </div>
    </div>

    <div class="results" id="results"></div>
</main>

<div id="footer-placeholder"></div>

<script src="../../js/common.js"></script>
<script>
    let insectData = [];
    let currentSort = {column: 'price', order: 'desc'};
    let loadedSeasons = new Set();

    // 등급별 가격 배율
    const starMultipliers = {
        1: 1,
        2: 1.5,
        3: 2,
        4: 4,
        5: 8
    };

    function updateDateTime() {
        const now = new Date();
        const days = ['일요일', '월요일', '화요일', '수요일', '목요일', '금요일', '토요일'];
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const date = String(now.getDate()).padStart(2, '0');
        const dayName = days[now.getDay()];
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        const seconds = String(now.getSeconds()).padStart(2, '0');

        document.getElementById('currentDate').textContent =
            `${year}년 ${month}월 ${date}일 ${dayName}`;
        document.getElementById('currentTime').textContent =
            `${hours}:${minutes}:${seconds}`;

        // 현재 시간대 계산 및 활성화
        const hour = now.getHours();
        let currentPeriod = '';
        let position = 0;

        if (hour >= 6 && hour < 12) {
            currentPeriod = 'morning';
            position = ((hour - 6) * 60 + now.getMinutes()) / 360;
            position = position * 25 + 12.5;
        } else if (hour >= 12 && hour < 18) {
            currentPeriod = 'afternoon';
            position = ((hour - 12) * 60 + now.getMinutes()) / 360;
            position = position * 25 + 37.5;
        } else if (hour >= 18 && hour < 24) {
            currentPeriod = 'evening';
            position = ((hour - 18) * 60 + now.getMinutes()) / 360;
            position = position * 25 + 62.5;
        } else {
            currentPeriod = 'night';
            position = (hour * 60 + now.getMinutes()) / 360;
            position = position * 25 + 87.5;
        }

        document.querySelectorAll('.time-segment').forEach(seg => {
            seg.classList.remove('active');
        });

        const activeSegment = document.querySelector(`.time-segment.${currentPeriod}`);
        if (activeSegment) {
            activeSegment.classList.add('active');
        }
    }

    // 1초마다 업데이트
    setInterval(updateDateTime, 1000);
    updateDateTime();

    // 페이지 로드시 현재 시간에 맞춰 select 박스 설정
    function setInitialTimeOption() {
        const hour = new Date().getHours();
        const timeSelect = document.getElementById('time');

        if (hour >= 6 && hour < 12) {
            timeSelect.value = '아침';
        } else if (hour >= 12 && hour < 18) {
            timeSelect.value = '낮';
        } else if (hour >= 18 && hour < 24) {
            timeSelect.value = '저녁';
        } else {
            timeSelect.value = '새벽';
        }
    }

    async function loadinsectData() {
        try {
            let response = await fetch('../../data/insect_data.json');

            if (!response.ok) {
                response = await fetch('./insect_data.json');
            }

            if (!response.ok) {
                throw new Error('insect_data.json 파일을 찾을 수 없습니다.');
            }

            insectData = await response.json();
            console.log('곤충 데이터 로드 성공:', insectData.length + '종');
            filterinsect();
        } catch (error) {
            console.error('데이터 로드 에러:', error);
            document.getElementById('results').innerHTML =
                `<div class="error">❌ 데이터 파일을 불러올 수 없습니다.</div>`;
        }
    }

    /**
     * 시즌 데이터를 insectData 에 병합합니다.
     * @param {string} dataPath  - src/data/ 기준 상대 경로 (예: 'season_ice/season_ice_insect.json')
     * @param {string} seasonKey - 중복 방지 추적 키 (예: 'ice', 'dreamlight')
     */
    async function loadSeasonData(dataPath, seasonKey) {
        if (loadedSeasons.has(seasonKey)) {
            alert('이미 추가된 시즌입니다.');
            return;
        }

        try {
            let response = await fetch(`../../data/${dataPath}`);

            if (!response.ok) {
                response = await fetch(`./${dataPath}`);
            }

            if (!response.ok) {
                throw new Error(`${dataPath} 파일을 찾을 수 없습니다.`);
            }

            const seasonData = await response.json();

            // 이름 기준 중복 제거하며 병합
            const combined = [...insectData, ...seasonData];
            insectData = combined.filter((insect, index, self) =>
                index === self.findIndex((f) => f.name === insect.name)
            );

            loadedSeasons.add(seasonKey);

            // 추가 버튼 비활성화
            const addBtn = document.getElementById(`btn${seasonKey.charAt(0).toUpperCase() + seasonKey.slice(1)}Add`);
            if (addBtn) addBtn.disabled = true;

            alert(`${seasonData.length}종의 시즌 데이터가 병합되었습니다.\n(총 ${insectData.length}종)`);
            filterinsect();
        } catch (error) {
            console.error('시즌 데이터 로드 에러:', error);
            alert(`시즌 데이터를 불러오지 못했습니다.\n${error.message}`);
        }
    }

    async function removeSeasonData() {
        if (loadedSeasons.size === 0) {
            alert('제거할 시즌 데이터가 없습니다.');
            return;
        }

        try {
            let response = await fetch('../../data/insect_data.json');
            if (!response.ok) {
                response = await fetch('./insect_data.json');
            }

            if (!response.ok) {
                throw new Error('insect_data.json 파일을 찾을 수 없습니다.');
            }

            insectData = await response.json();
            loadedSeasons.clear();

            // 모든 추가 버튼을 다시 활성화
            ['btnIceAdd', 'btnDreamlightAdd', 'btnBlocktownAdd'].forEach(id => {
                const btn = document.getElementById(id);
                if (btn) btn.disabled = false;
            });

            alert('모든 시즌 데이터가 제거되었습니다.\n기본 데이터만 표시됩니다.');
            filterinsect();
        } catch (error) {
            console.error('데이터 초기화 에러:', error);
            alert('데이터를 초기화하지 못했습니다.');
        }
    }

    function filterinsect() {
        if (insectData.length === 0) {
            document.getElementById('results').innerHTML = '<div class="loading">⏳ 데이터를 불러오는 중...</div>';
            return;
        }

        const insectName = document.getElementById('insectName').value.trim().toLowerCase();
        const level = parseInt(document.getElementById('level').value);
        const time = document.getElementById('time').value;
        const weather = document.getElementById('weather').value;

        const filtered = insectData.filter(insect => {
            if (insectName && !(insect.name + " " + (insect.nameJa || "")).toLowerCase().includes(insectName)) return false;
            if (insect.level > level) return false;
            const timeOk = insect.time && insect.time.includes(time);
            const weatherOk = insect.weather && insect.weather.includes(weather);
            return timeOk && weatherOk;
        });

        displayResults(filtered);
    }

    function sortinsect(insectes, column, order) {
        return [...insectes].sort((a, b) => {
            let valueA, valueB;
            if (column === 'name' || column === 'habitat') {
                valueA = column === 'name' ? a.name : a.habitat;
                valueB = column === 'name' ? b.name : b.habitat;
                return order === 'asc' ? valueA.localeCompare(valueB, 'ko') : valueB.localeCompare(valueA, 'ko');
            } else if (column === 'level') {
                valueA = a.level;
                valueB = b.level;
            } else if (column === 'price') {
                valueA = a.price;
                valueB = b.price;
            }
            return order === 'asc' ? valueA - valueB : valueB - valueA;
        });
    }

    function handleSort(column) {
        if (currentSort.column === column) {
            currentSort.order = currentSort.order === 'asc' ? 'desc' : 'asc';
        } else {
            currentSort.column = column;
            currentSort.order = 'asc';
        }
        filterinsect();
    }

    function updatePrice(insectName, basePrice, selectElement) {
        const star = parseInt(selectElement.value);
        const multiplier = starMultipliers[star];
        const calculatedPrice = Math.floor(basePrice * multiplier);

        const priceSpan = selectElement.parentElement.querySelector('.price');
        priceSpan.textContent = `₩${calculatedPrice}`;
    }

    /* 곤충 이미지 로드 실패 시 자리 표시자로 교체 */
    function handleInsectImgError(img) {
        const placeholder = document.createElement('div');
        placeholder.className = 'fish-thumb-placeholder';
        placeholder.textContent = '🦋';
        img.parentNode.replaceChild(placeholder, img);
    }

    function getSpecialIcon(special) {
        const icons = {
            '빙설 시즌': '❄️'
        }
        return icons[special] || '';
    }

    function getHabitatIcon(habitat) {
        const icons = {
            '곤충 유인 사건': '🎯',
            '곤충 유인기': '📡',
            '얼음 결정 나비 사건': '❄️',
        }
        return icons[habitat] || '';
    }

    function displayResults(insectes) {
        const resultsDiv = document.getElementById('results');

        if (insectes.length === 0) {
            resultsDiv.innerHTML = '<div class="no-results">⚠️ 현재 조건에서 잡을 수 있는 곤충가 없어요!</div>';
            return;
        }

        const sortedinsectes = sortinsect(insectes, currentSort.column, currentSort.order);

        let html = `
                <div class="habitat-group">
                    <div class="habitat-header">
                        <span>검색 결과</span>
                        <span class="count-badge">${sortedinsectes.length} 종</span>
                    </div>
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th class="col-fish-img">이미지</th>
                                    <th class="sortable ${currentSort.column === 'name' ? 'sort-' + currentSort.order : ''}" onclick="handleSort('name')">이름</th>
                                    <th class="sortable ${currentSort.column === 'habitat' ? 'sort-' + currentSort.order : ''}" onclick="handleSort('habitat')">서식지</th>
                                    <th class="sortable ${currentSort.column === 'level' ? 'sort-' + currentSort.order : ''}" onclick="handleSort('level')">레벨</th>
                                    <th class="sortable ${currentSort.column === 'price' ? 'sort-' + currentSort.order : ''}" onclick="handleSort('price')">판매가 (등급별)</th>
                                    <th>출현 시간</th>
                                    <th>날씨 조건</th>
                                </tr>
                            </thead>
                            <tbody>`;

        sortedinsectes.forEach(insect => {
            // --- 시간 표시 로직 ---
            const allTimes = ['아침', '낮', '저녁', '새벽'];
            const isAlwaysTime = insect.timeAll || (insect.time && allTimes.every(t => insect.time.includes(t)));
            const timeDisplay = isAlwaysTime
                ? '<span class="time-badge always">하루 종일</span>'
                : insect.time.map(t => `<span class="time-badge">${t}</span>`).join(' ');

            // --- 날씨 표시 로직 ---
            const allWeathers = ['맑음', '비', '무지개'];
            const isAlwaysWeather = insect.weatherAll || (insect.weather && allWeathers.every(w => insect.weather.includes(w)));
            const weatherDisplay = isAlwaysWeather
                ? '<span class="weather-badge always">항상</span>'
                : insect.weather.map(w => `<span class="weather-badge">${w}</span>`).join(' ');

            html += `
                    <tr>
                        <td class="col-fish-img">${insect.image
                            ? `<img class="fish-thumb" src="../../../public/images/insect_img/insect${insect.image}.webp" alt="${getLocalizedName(insect)}" onerror="handleInsectImgError(this)">`
                            : `<div class="fish-thumb-placeholder insect-photo-missing" title="사진 없음">🐞<span>사진 없음</span></div>`}</td>
                        <td class="item-name">${getSpecialIcon(insect.special)}${getLocalizedName(insect)}</td>
                        <td class="col-habitat-bird">${getHabitatIcon(insect.habitat)}${insect.habitat}</td>
                        <td><span class="level-badge">Lv.${insect.level}</span></td>
                        <td>
                            <div class="price-cell">
                                <span>⭐</span>
                                <select class="star-selector" onchange="updatePrice('${getLocalizedName(insect)}', ${insect.price}, this)">
                                    <option value="1">1성</option>
                                    <option value="2">2성</option>
                                    <option value="3">3성</option>
                                    <option value="4">4성</option>
                                    <option value="5">5성</option>
                                </select>
                                <span class="price">₩${insect.price}</span>
                            </div>
                        </td>
                        <td>${timeDisplay}</td>
                        <td>${weatherDisplay}</td>
                    </tr>`;
        });

        html += `</tbody></table></div></div>`;
        resultsDiv.innerHTML = html;
    }

    // 시간 선택을 먼저 하고 데이터를 로드하도록 변경
    window.onload = async function () {
        setInitialTimeOption();
        await loadinsectData();
    };
</script>
</body>
</html>
