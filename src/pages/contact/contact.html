<!DOCTYPE html>
<html lang="ko">
<head>
    <script>
        // Google Analytics 4 초기화
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-RXTDCP8G1V');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>개발자에게 커피 한 잔 - 두근두근타운 데이터 허브</title>
    <link rel="stylesheet" href="../../css/common.css">
    <style>
        /* ========================================
           contact 페이지 전용 스타일
        ======================================== */

        /* 페이지 전체 중앙 정렬 컨테이너 */
        .contact-container {
            max-width: 480px;
            margin: 60px auto;
            padding: 0 20px;
            text-align: center;
        }

        /* 카드 박스 */
        .contact-card {
            background: var(--color-surface);
            border-radius: 20px;
            padding: 48px 40px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
        }

        /* 상단 이모지 아이콘 */
        .contact-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        /* 제목 */
        .contact-card h1 {
            font-size: 1.5rem;
            color: var(--color-text-strong);
            margin-bottom: 10px;
        }

        /* 설명 문구 */
        .contact-card .desc {
            font-size: 0.95rem;
            color: var(--color-text-muted);
            line-height: 1.7;
            margin-bottom: 32px;
        }

        /* QR 이미지 래퍼 - 테두리 및 여백 */
        .qr-wrapper {
            display: inline-block;
            background: #f9f9f9;
            border: 2px solid var(--color-border);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 24px;
        }

        /* QR 이미지 자체 */
        .qr-wrapper img {
            width: 220px;
            height: 220px;
            object-fit: contain;
            display: block;
        }

        /* QR 아래 안내 텍스트 */
        .qr-caption {
            font-size: 0.85rem;
            color: var(--color-text-muted);
            margin-bottom: 28px;
        }

        /* 구분선 */
        .divider {
            border: none;
            border-top: 1px solid var(--color-border);
            margin: 24px 0;
        }

        /* 하단 감사 메시지 */
        .thank-you {
            font-size: 0.9rem;
            color: var(--color-text-soft);
            line-height: 1.7;
        }

        /* 카카오톡 직접 연결 버튼 */
        .btn-kakao {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 28px;
            background: #FEE500;       /* 카카오 공식 노란색 */
            color: #3A1D1D;            /* 카카오 공식 다크 브라운 */
            border-radius: 999px;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 700;
            transition: background 0.2s, transform 0.15s;
            margin-bottom: 12px;
        }

        .btn-kakao:hover {
            background: #F5D800;
            transform: translateY(-2px);
        }

        /* 뒤로가기 버튼 */
        .btn-back {
            display: inline-block;
            margin-top: 28px;
            padding: 10px 28px;
            background: var(--color-primary);
            color: white;
            border-radius: 999px;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            transition: background 0.2s;
        }

        .btn-back:hover {
            background: var(--color-primary-dark);
        }
    </style>

    <!-- 방문자 추적 스크립트 (로컬 localStorage 기록용) -->
    <script src="../../../src/js/tracker.js"></script>
</head>
<body>
    <!-- 헤더 영역 -->
    <div id="header-placeholder"></div>

    <main>
        <div class="contact-container">
            <div class="contact-card">

                <!-- 아이콘 & 제목 -->
                <div class="contact-icon">☕</div>
                <h1>개발자에게 커피 한 잔</h1>
                <p class="desc">
                    아래 QR 코드로 카카오톡 오픈채팅에서<br>
                    1:1 대화 또는 후원을 보내주실 수 있어요.<br>
                    작은 응원 하나가 큰 힘이 됩니다!
                </p>

                <!-- QR 코드 이미지 -->
                <div class="qr-wrapper">
                    <img
                        src="../../../public/images/main_img/KakaoTalk_open_profile_qr.webp"
                        alt="카카오톡 오픈채팅 QR 코드"
                    >
                </div>

                <!-- QR 안내 캡션 -->
                <p class="qr-caption">📷 카카오톡 앱 → QR 스캔으로 바로 연결</p>

                <!-- 모바일 유저를 위한 직접 링크 버튼 -->
                <a href="https://open.kakao.com/o/sX1CgKji" target="_blank" class="btn-kakao">
                    <span>💬</span> 카카오톡으로 바로 열기
                </a>

                <hr class="divider">

                <!-- 감사 메시지 -->
                <p class="thank-you">
                    이 사이트를 찾아와 주시는 것만으로도<br>
                    정말 감사합니다 🏝️
                </p>

                <!-- 홈으로 뒤로가기 -->
                <a href="../main/main.html" class="btn-back">🏠 홈으로 돌아가기</a>
            </div>
        </div>
    </main>

    <!-- 푸터 영역 -->
    <div id="footer-placeholder"></div>

    <script src="../../js/common.js"></script>
</body>
</html>
